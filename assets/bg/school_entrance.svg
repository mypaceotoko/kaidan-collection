<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="vpGlow" cx="50%" cy="46%" r="28%">
      <stop offset="0%"   stop-color="#0e0e1a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="lightHalo" cx="50%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="#14141e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="floorG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#050508"/>
      <stop offset="100%" stop-color="#090910"/>
    </linearGradient>
    <!-- Reflection on floor -->
    <linearGradient id="reflectG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0c0c14" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Base dark background -->
  <rect width="1920" height="1080" fill="#040408"/>

  <!-- ── GEOMETRY: entrance hall in perspective ──────────────────────────── -->
  <!-- VP ≈ (960, 460) -->

  <!-- Ceiling -->
  <polygon points="0,0 1920,0 960,460" fill="#030306"/>
  <!-- Left wall -->
  <polygon points="0,0 0,1080 960,460" fill="#06060c"/>
  <!-- Right wall -->
  <polygon points="1920,0 1920,1080 960,460" fill="#050509"/>
  <!-- Floor -->
  <polygon points="0,1080 1920,1080 960,460" fill="url(#floorG)"/>

  <!-- Floor reflection sheen -->
  <polygon points="0,1080 1920,1080 960,460" fill="url(#reflectG)"/>

  <!-- Vanishing glow -->
  <ellipse cx="960" cy="460" rx="380" ry="200" fill="url(#vpGlow)"/>

  <!-- ── CEILING FLUORESCENT LIGHT ──────────────────────────────────────── -->
  <!-- Fixture close -->
  <rect x="820" y="52"  width="280" height="22" fill="#151520" rx="2"/>
  <rect x="825" y="56"  width="270" height="14" fill="#1e1e2e" rx="1"/>
  <!-- Light halo -->
  <ellipse cx="960" cy="63"  rx="320" ry="90"  fill="#0d0d18" opacity="0.55"/>
  <ellipse cx="960" cy="63"  rx="160" ry="45"  fill="#12121e" opacity="0.4"/>
  <!-- Flicker bar (slight irregularity) -->
  <rect x="825" y="56" width="80" height="14" fill="#161625" rx="1"/>

  <!-- Fixture mid -->
  <rect x="885" y="212" width="150" height="14" fill="#101018" rx="1"/>
  <rect x="888" y="215" width="144" height="8"  fill="#141422" rx="1"/>
  <ellipse cx="960" cy="219" rx="180" ry="50"  fill="#0a0a14" opacity="0.4"/>

  <!-- Fixture far -->
  <rect x="920" y="332" width="80"  height="8"  fill="#0c0c16" rx="1"/>
  <ellipse cx="960" cy="336" rx="100" ry="28"  fill="#090912" opacity="0.3"/>

  <!-- Ceiling wire lines -->
  <line x1="960" y1="0"   x2="960" y2="52"  stroke="#08080e" stroke-width="1.5"/>
  <line x1="960" y1="74"  x2="960" y2="212" stroke="#07070c" stroke-width="1"/>
  <line x1="960" y1="226" x2="960" y2="332" stroke="#06060b" stroke-width="0.8"/>

  <!-- ── LEFT: SHOE LOCKERS ─────────────────────────────────────────────── -->
  <!-- Bank 1 (closest) -->
  <rect x="0"   y="360" width="140" height="610" fill="#0a0a12"/>
  <rect x="4"   y="364" width="130" height="600" fill="#080810"/>
  <!-- Locker doors detail -->
  <rect x="4"   y="364" width="130" height="198" fill="#07070e"/>
  <rect x="4"   y="566" width="130" height="200" fill="#080810"/>
  <rect x="4"   y="770" width="130" height="194" fill="#07070e"/>
  <!-- Handles -->
  <rect x="118" y="458" width="8"   height="20"  fill="#131318" rx="2"/>
  <rect x="118" y="660" width="8"   height="20"  fill="#131318" rx="2"/>
  <rect x="118" y="860" width="8"   height="20"  fill="#131318" rx="2"/>
  <!-- Horizontal dividers -->
  <rect x="4"   y="562" width="130" height="4"   fill="#0a0a14"/>
  <rect x="4"   y="766" width="130" height="4"   fill="#0a0a14"/>

  <!-- Bank 2 -->
  <rect x="140" y="406" width="95"  height="560" fill="#09090f"/>
  <rect x="143" y="409" width="88"  height="553" fill="#07070d"/>
  <rect x="143" y="409" width="88"  height="182" fill="#06060c"/>
  <rect x="143" y="595" width="88"  height="183" fill="#07070d"/>
  <rect x="143" y="782" width="88"  height="180" fill="#06060c"/>
  <rect x="224" y="498" width="6"   height="18"  fill="#111116" rx="1"/>
  <rect x="224" y="682" width="6"   height="18"  fill="#111116" rx="1"/>
  <rect x="143" y="591" width="88"  height="4"   fill="#09090e"/>
  <rect x="143" y="778" width="88"  height="4"   fill="#09090e"/>

  <!-- Bank 3 (perspective shrink) -->
  <rect x="235" y="436" width="68"  height="513" fill="#08080d"/>
  <rect x="238" y="438" width="62"  height="508" fill="#06060b"/>
  <rect x="238" y="438" width="62"  height="168" fill="#05050a"/>
  <rect x="238" y="610" width="62"  height="168" fill="#06060b"/>
  <rect x="238" y="782" width="62"  height="164" fill="#05050a"/>
  <rect x="238" y="606" width="62"  height="4"   fill="#08080d"/>
  <rect x="238" y="778" width="62"  height="4"   fill="#08080d"/>
  <rect x="292" y="520" width="4"   height="14"  fill="#0f0f14" rx="1"/>
  <rect x="292" y="690" width="4"   height="14"  fill="#0f0f14" rx="1"/>

  <!-- Banks 4–N (converging to VP, decreasing size) -->
  <rect x="303" y="452" width="50"  height="480" fill="#07070c"/>
  <rect x="353" y="462" width="38"  height="450" fill="#06060b"/>
  <rect x="391" y="470" width="30"  height="425" fill="#06060a"/>
  <rect x="421" y="476" width="22"  height="405" fill="#050509"/>
  <rect x="443" y="480" width="17"  height="390" fill="#050508"/>
  <rect x="460" y="483" width="500" height="380" fill="#040407"/>

  <!-- ── RIGHT: WINDOWS (showing dark outside) ─────────────────────────── -->
  <!-- Window 1 (close) -->
  <rect x="1462" y="220" width="458" height="470" fill="#020208"/>
  <rect x="1470" y="228" width="442" height="454" fill="#01010a"/>
  <rect x="1462" y="220" width="6"   height="470" fill="#0b0b15"/>
  <rect x="1914" y="220" width="6"   height="470" fill="#0b0b15"/>
  <rect x="1462" y="220" width="458" height="6"   fill="#0b0b15"/>
  <rect x="1462" y="684" width="458" height="6"   fill="#0b0b15"/>
  <rect x="1462" y="448" width="458" height="4"   fill="#0b0b12"/>
  <rect x="1688" y="220" width="4"   height="470" fill="#0b0b12"/>
  <!-- Very faint night sky / moonlight in window -->
  <rect x="1470" y="228" width="442" height="454" fill="#03031a" opacity="0.6"/>
  <!-- Faint distant building shapes outside -->
  <rect x="1540" y="480" width="120" height="200" fill="#020210" opacity="0.5"/>
  <rect x="1700" y="510" width="90"  height="170" fill="#020210" opacity="0.4"/>

  <!-- Window 2 (mid) -->
  <rect x="1244" y="318" width="218" height="280" fill="#020208"/>
  <rect x="1250" y="324" width="206" height="268" fill="#01010a"/>
  <rect x="1244" y="318" width="4"   height="280" fill="#090910"/>
  <rect x="1458" y="318" width="4"   height="280" fill="#090910"/>
  <rect x="1244" y="318" width="218" height="4"   fill="#090910"/>
  <rect x="1244" y="594" width="218" height="4"   fill="#090910"/>

  <!-- ── INNER DOORWAY / CORRIDOR MOUTH ────────────────────────────────── -->
  <!-- Far doorway arch -->
  <rect x="860" y="362" width="200" height="210" fill="#020205"/>
  <rect x="865" y="365" width="190" height="205" fill="#010103"/>
  <rect x="954" y="365" width="4"   height="205" fill="#030307"/>
  <!-- Door frame -->
  <rect x="856" y="358" width="208" height="8"   fill="#070710"/>
  <rect x="856" y="362" width="6"   height="210" fill="#070710"/>
  <rect x="1058" y="362" width="6"  height="210" fill="#070710"/>

  <!-- ── FLOOR PERSPECTIVE LINES ───────────────────────────────────────── -->
  <line x1="960" y1="460" x2="0"    y2="1080" stroke="#07070e" stroke-width="1.5"/>
  <line x1="960" y1="460" x2="480"  y2="1080" stroke="#06060c" stroke-width="1"/>
  <line x1="960" y1="460" x2="960"  y2="1080" stroke="#07070e" stroke-width="1.5"/>
  <line x1="960" y1="460" x2="1440" y2="1080" stroke="#06060c" stroke-width="1"/>
  <line x1="960" y1="460" x2="1920" y2="1080" stroke="#07070e" stroke-width="1.5"/>
  <!-- Horizontal depth lines -->
  <line x1="0"   y1="850" x2="1920" y2="850"  stroke="#07070d" stroke-width="1"/>
  <line x1="0"   y1="700" x2="1920" y2="700"  stroke="#06060c" stroke-width="0.8"/>
  <line x1="50"  y1="590" x2="1870" y2="590"  stroke="#05050b" stroke-width="0.6"/>
  <line x1="200" y1="525" x2="1720" y2="525"  stroke="#05050a" stroke-width="0.5"/>

  <!-- Final darkness -->
  <rect width="1920" height="1080" fill="#000003" opacity="0.28"/>
</svg>

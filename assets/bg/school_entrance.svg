<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!--
    School shoe locker entrance — dark, fluorescent light above,
    rows of lockers in perspective, night visible through the glass door.
  -->
  <defs>
    <radialGradient id="lightGlow" cx="50%" cy="15%" r="55%">
      <stop offset="0%"   stop-color="#9090c0" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#484880" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#181820"/>
      <stop offset="100%" stop-color="#101018"/>
    </linearGradient>
    <linearGradient id="ceiling" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0e0e18"/>
      <stop offset="100%" stop-color="#161620"/>
    </linearGradient>
    <radialGradient id="doorNight" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0a0a24"/>
      <stop offset="100%" stop-color="#060614"/>
    </radialGradient>
  </defs>

  <!-- Base dark -->
  <rect width="1920" height="1080" fill="#0e0e18"/>

  <!-- Ceiling -->
  <polygon points="0,0 1920,0 1920,280 960,380 0,280" fill="url(#ceiling)"/>

  <!-- Fluorescent light fixture -->
  <rect x="760" y="40"  width="400" height="28"  fill="#2a2a48" rx="3"/>
  <rect x="765" y="43"  width="390" height="20"  fill="#c0c0e0" opacity="0.9"/>
  <!-- Fluorescent glow on ceiling -->
  <ellipse cx="960" cy="80" rx="400" ry="90" fill="url(#lightGlow)"/>
  <!-- Second (flickering/dead) tube — slightly dim -->
  <rect x="760" y="80"  width="400" height="22"  fill="#22223a" rx="3"/>
  <rect x="765" y="83"  width="390" height="16"  fill="#585870" opacity="0.6"/>

  <!-- Floor -->
  <polygon points="0,1080 1920,1080 1920,620 960,380 0,620" fill="url(#floor)"/>
  <!-- Floor tile lines (perspective) -->
  <line x1="960" y1="380" x2="0"    y2="1080" stroke="#1a1a28" stroke-width="2"/>
  <line x1="960" y1="380" x2="480"  y2="1080" stroke="#181826" stroke-width="1.5"/>
  <line x1="960" y1="380" x2="960"  y2="1080" stroke="#1c1c2a" stroke-width="2.5"/>
  <line x1="960" y1="380" x2="1440" y2="1080" stroke="#181826" stroke-width="1.5"/>
  <line x1="960" y1="380" x2="1920" y2="1080" stroke="#1a1a28" stroke-width="2"/>
  <!-- Horizontal tile lines -->
  <line x1="0"   y1="850" x2="1920" y2="850"  stroke="#181826" stroke-width="1.5"/>
  <line x1="0"   y1="680" x2="1920" y2="680"  stroke="#161624" stroke-width="1.2"/>
  <line x1="60"  y1="550" x2="1860" y2="550"  stroke="#141422" stroke-width="1"/>
  <line x1="200" y1="470" x2="1720" y2="470"  stroke="#131320" stroke-width="0.8"/>

  <!-- LEFT LOCKERS (vanishing-point perspective, large on left) -->
  <rect x="0"   y="90"  width="140" height="900" fill="#242438"/>
  <rect x="5"   y="95"  width="128" height="888" fill="#1e1e30"/>
  <!-- Locker divisions -->
  <rect x="5"   y="95"  width="128" height="295" fill="#1a1a2c"/>
  <rect x="5"   y="394" width="128" height="296" fill="#1e1e30"/>
  <rect x="5"   y="694" width="128" height="289" fill="#1a1a2c"/>
  <rect x="5"   y="390" width="128" height="6"   fill="#2e2e48"/>
  <rect x="5"   y="690" width="128" height="6"   fill="#2e2e48"/>
  <!-- Locker handles -->
  <rect x="120" y="234" width="10"  height="22"  fill="#3a3a5a" rx="2"/>
  <rect x="120" y="532" width="10"  height="22"  fill="#3a3a5a" rx="2"/>
  <rect x="120" y="830" width="10"  height="22"  fill="#3a3a5a" rx="2"/>

  <!-- Second locker bank (smaller, receding) -->
  <rect x="140" y="140" width="100" height="820" fill="#1e1e30"/>
  <rect x="144" y="144" width="91"  height="814" fill="#1a1a2c"/>
  <rect x="144" y="144" width="91"  height="270" fill="#181828"/>
  <rect x="144" y="418" width="91"  height="272" fill="#1a1a2c"/>
  <rect x="144" y="694" width="91"  height="264" fill="#181828"/>
  <rect x="228" y="278" width="6"   height="18"  fill="#303050" rx="1"/>

  <!-- Third bank (smaller still) -->
  <rect x="240" y="180" width="74"  height="740" fill="#1c1c2e"/>
  <rect x="243" y="183" width="67"  height="733" fill="#181828"/>
  <rect x="307" y="310" width="5"   height="14"  fill="#2e2e4e" rx="1"/>

  <!-- Fourth bank -->
  <rect x="314" y="210" width="55"  height="660" fill="#1a1a2c"/>
  <rect x="317" y="213" width="49"  height="654" fill="#161626"/>

  <!-- Receding lockers merge into wall -->
  <rect x="369" y="236" width="40"  height="610" fill="#181826"/>
  <rect x="409" y="254" width="550" height="572" fill="#141422"/>

  <!-- RIGHT LOCKERS (mirror perspective) -->
  <rect x="1780" y="90"  width="140" height="900" fill="#242438"/>
  <rect x="1787" y="95"  width="128" height="888" fill="#1e1e30"/>
  <rect x="1787" y="95"  width="128" height="295" fill="#1a1a2c"/>
  <rect x="1787" y="394" width="128" height="296" fill="#1e1e30"/>
  <rect x="1787" y="694" width="128" height="289" fill="#1a1a2c"/>
  <rect x="1787" y="390" width="128" height="6"   fill="#2e2e48"/>
  <rect x="1787" y="690" width="128" height="6"   fill="#2e2e48"/>
  <rect x="1790" y="234" width="10"  height="22"  fill="#3a3a5a" rx="2"/>
  <rect x="1790" y="532" width="10"  height="22"  fill="#3a3a5a" rx="2"/>
  <rect x="1790" y="830" width="10"  height="22"  fill="#3a3a5a" rx="2"/>

  <rect x="1680" y="140" width="100" height="820" fill="#1e1e30"/>
  <rect x="1685" y="144" width="91"  height="814" fill="#1a1a2c"/>
  <rect x="1685" y="144" width="91"  height="270" fill="#181828"/>
  <rect x="1685" y="418" width="91"  height="272" fill="#1a1a2c"/>
  <rect x="1685" y="694" width="91"  height="264" fill="#181828"/>
  <rect x="1686" y="278" width="6"   height="18"  fill="#303050" rx="1"/>

  <rect x="1606" y="180" width="74"  height="740" fill="#1c1c2e"/>
  <rect x="1610" y="183" width="67"  height="733" fill="#181828"/>
  <rect x="1608" y="310" width="5"   height="14"  fill="#2e2e4e" rx="1"/>

  <rect x="1551" y="210" width="55"  height="660" fill="#1a1a2c"/>
  <rect x="1554" y="213" width="49"  height="654" fill="#161626"/>

  <rect x="1511" y="236" width="40"  height="610" fill="#181826"/>
  <rect x="961"  y="254" width="550" height="572" fill="#141422"/>

  <!-- BACK WALL with door to outside -->
  <!-- Left wall panel -->
  <rect x="490" y="300" width="270" height="510" fill="#161624"/>
  <!-- Right wall panel -->
  <rect x="1160" y="300" width="270" height="510" fill="#161624"/>

  <!-- DOOR — dark glass showing night outside -->
  <rect x="760"  y="305" width="185" height="570" fill="#0a0a20"/>
  <rect x="765"  y="310" width="175" height="560" fill="url(#doorNight)"/>
  <rect x="975"  y="305" width="185" height="570" fill="#0a0a20"/>
  <rect x="980"  y="310" width="175" height="560" fill="url(#doorNight)"/>
  <!-- Door frames -->
  <rect x="758"  y="302" width="7"   height="576" fill="#282838"/>
  <rect x="941"  y="302" width="22"  height="576" fill="#282838"/>
  <rect x="1158" y="302" width="7"   height="576" fill="#282838"/>
  <rect x="758"  y="300" width="407" height="8"   fill="#282838"/>
  <rect x="758"  y="874" width="407" height="8"   fill="#282838"/>
  <!-- Door handles -->
  <rect x="935"  y="575" width="12"  height="35"  fill="#383858" rx="3"/>
  <rect x="972"  y="575" width="12"  height="35"  fill="#383858" rx="3"/>
  <!-- Night outside through door (subtle courtyard shapes) -->
  <rect x="780"  y="560" width="145" height="18"  fill="#06060e" opacity="0.6"/>
  <rect x="995"  y="560" width="145" height="18"  fill="#06060e" opacity="0.6"/>

  <!-- Light on floor (pool from fluorescent) -->
  <ellipse cx="960" cy="600" rx="350" ry="90" fill="#18183a" opacity="0.4"/>

  <!-- Wall-mounted notice board -->
  <rect x="65" y="160" width="55"  height="85"  fill="#1e1e2e"/>
  <rect x="68" y="163" width="49"  height="79"  fill="#1a1a28"/>
  <rect x="68" y="163" width="49"  height="4"   fill="#303050"/>
  <!-- Paper on notice board -->
  <rect x="70" y="170" width="20"  height="28"  fill="#24243a"/>
  <rect x="94" y="170" width="20"  height="12"  fill="#24243a"/>

  <!-- Overall darkness / vignette -->
  <rect width="1920" height="1080" fill="#000008" opacity="0.2"/>
</svg>

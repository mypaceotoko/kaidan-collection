<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Moonlight beam through window -->
    <linearGradient id="moonBeam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#080818" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="floorG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#040408"/>
      <stop offset="100%" stop-color="#07070e"/>
    </linearGradient>
    <radialGradient id="chalkDust" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0a0a12" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Window moonlight fill -->
    <linearGradient id="winMoon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#03041a"/>
      <stop offset="60%"  stop-color="#02031a"/>
      <stop offset="100%" stop-color="#01010e"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="#030308"/>

  <!-- ── ROOM GEOMETRY (looking forward toward blackboard) ────────────── -->
  <!-- VP = (960, 420) -->
  <!-- Left wall -->
  <polygon points="0,0  0,1080  960,420" fill="#06060c"/>
  <!-- Right wall -->
  <polygon points="1920,0  1920,1080  960,420" fill="#05050a"/>
  <!-- Ceiling -->
  <polygon points="0,0  1920,0  960,420" fill="#030306"/>
  <!-- Floor -->
  <polygon points="0,1080  1920,1080  960,420" fill="url(#floorG)"/>

  <!-- ── BLACKBOARD (front wall) ─────────────────────────────────────── -->
  <rect x="440" y="170" width="1040" height="420" fill="#050509"/>
  <rect x="452" y="182" width="1016" height="396" fill="#060608"/>
  <!-- Chalk tray -->
  <rect x="440" y="590" width="1040" height="16"  fill="#070710"/>
  <!-- Faint chalk marks (barely visible smears) -->
  <rect x="500" y="220" width="220" height="3"    fill="#0c0c14" opacity="0.4"/>
  <rect x="500" y="238" width="180" height="2"    fill="#0c0c14" opacity="0.3"/>
  <rect x="760" y="228" width="140" height="3"    fill="#0d0d16" opacity="0.35"/>
  <rect x="960" y="218" width="100" height="2"    fill="#0b0b12" opacity="0.3"/>
  <ellipse cx="960" cy="390" rx="260" ry="40"     fill="url(#chalkDust)"/>
  <!-- Board frame -->
  <rect x="440" y="170" width="1040" height="8"   fill="#08080e"/>
  <rect x="440" y="582" width="1040" height="8"   fill="#08080e"/>
  <rect x="440" y="170" width="8"    height="420" fill="#08080e"/>
  <rect x="1472" y="170" width="8"   height="420" fill="#08080e"/>

  <!-- ── RIGHT WALL: WINDOWS (moonlight) ──────────────────────────────── -->
  <!-- W1 close/large -->
  <rect x="1508" y="80"  width="412" height="530" fill="#03041e"/>
  <rect x="1516" y="88"  width="396" height="514" fill="url(#winMoon)"/>
  <!-- Moon disc barely visible in top corner -->
  <circle cx="1790" cy="130" r="28"  fill="#06071e"/>
  <circle cx="1790" cy="130" r="22"  fill="#05061c"/>
  <!-- Window frame -->
  <rect x="1508" y="80"  width="6"   height="530" fill="#0b0b16"/>
  <rect x="1914" y="80"  width="6"   height="530" fill="#0b0b16"/>
  <rect x="1508" y="80"  width="412" height="6"   fill="#0b0b16"/>
  <rect x="1508" y="604" width="412" height="6"   fill="#0b0b16"/>
  <rect x="1508" y="338" width="412" height="4"   fill="#09091a"/>
  <rect x="1710" y="80"  width="4"   height="530" fill="#09091a"/>

  <!-- W2 mid -->
  <rect x="1280" y="188" width="228" height="318" fill="#02031a"/>
  <rect x="1286" y="194" width="216" height="306" fill="#02031a"/>
  <rect x="1280" y="188" width="4"   height="318" fill="#0a0a14"/>
  <rect x="1504" y="188" width="4"   height="318" fill="#0a0a14"/>
  <rect x="1280" y="188" width="228" height="4"   fill="#0a0a14"/>
  <rect x="1280" y="502" width="228" height="4"   fill="#0a0a14"/>
  <rect x="1280" y="342" width="228" height="3"   fill="#0a0a12"/>
  <rect x="1392" y="188" width="3"   height="318" fill="#0a0a12"/>

  <!-- W3 far -->
  <rect x="1142" y="272" width="138" height="208" fill="#02031a"/>
  <rect x="1145" y="275" width="132" height="202" fill="#01021a"/>

  <!-- MOONLIGHT BEAM (diagonal shaft across classroom floor) -->
  <polygon points="1508,88 1914,88 1400,1080 750,1080" fill="url(#moonBeam)" opacity="0.45"/>
  <!-- Secondary soft light patch on floor -->
  <ellipse cx="1050" cy="920" rx="340" ry="80"  fill="#05051a" opacity="0.35"/>
  <ellipse cx="1150" cy="940" rx="200" ry="50"  fill="#06061e" opacity="0.25"/>

  <!-- ── CEILING LIGHT ──────────────────────────────────────────────────── -->
  <!-- 2 rows of fluorescent fixtures (mostly off, one flickering) -->
  <rect x="520"  y="55"  width="360" height="18"  fill="#101018" rx="2"/>
  <rect x="524"  y="58"  width="352" height="11"  fill="#141420" rx="1"/>
  <rect x="1040" y="55"  width="360" height="18"  fill="#0e0e16" rx="2"/>
  <rect x="1044" y="58"  width="352" height="11"  fill="#121220" rx="1"/>
  <!-- One broken fixture (dark) -->
  <rect x="524"  y="58"  width="120" height="11"  fill="#060610" rx="1"/>
  <!-- Faint glow from the working panel -->
  <ellipse cx="780"  cy="64"  rx="200" ry="55"  fill="#0b0b18" opacity="0.4"/>
  <ellipse cx="1220" cy="64"  rx="210" ry="55"  fill="#0b0b18" opacity="0.35"/>

  <!-- ── DESK ROWS (perspective) ───────────────────────────────────────── -->
  <!-- Desks are drawn as dark trapezoids, 6 columns × 4 rows visible -->
  <!-- Row 4 (farthest) -->
  <rect x="550"  y="630" width="52"  height="28"  fill="#070710"/>
  <rect x="666"  y="630" width="52"  height="28"  fill="#07070f"/>
  <rect x="782"  y="630" width="52"  height="28"  fill="#070710"/>
  <rect x="898"  y="630" width="52"  height="28"  fill="#07070f"/>
  <rect x="1014" y="630" width="52"  height="28"  fill="#070710"/>
  <rect x="1130" y="630" width="52"  height="28"  fill="#07070f"/>
  <rect x="1246" y="630" width="52"  height="28"  fill="#070710"/>
  <!-- Desk legs row 4 -->
  <rect x="554"  y="658" width="4"   height="22"  fill="#060609"/>
  <rect x="594"  y="658" width="4"   height="22"  fill="#060609"/>
  <rect x="670"  y="658" width="4"   height="22"  fill="#060609"/>
  <rect x="710"  y="658" width="4"   height="22"  fill="#060609"/>

  <!-- Row 3 -->
  <rect x="468"  y="718" width="68"  height="36"  fill="#080810"/>
  <rect x="612"  y="718" width="68"  height="36"  fill="#07070f"/>
  <rect x="756"  y="718" width="68"  height="36"  fill="#080810"/>
  <rect x="900"  y="718" width="68"  height="36"  fill="#07070f"/>
  <rect x="1044" y="718" width="68"  height="36"  fill="#080810"/>
  <rect x="1188" y="718" width="68"  height="36"  fill="#07070f"/>
  <rect x="1332" y="718" width="68"  height="36"  fill="#080810"/>
  <!-- Legs -->
  <rect x="472"  y="754" width="5"   height="28"  fill="#060609"/>
  <rect x="527"  y="754" width="5"   height="28"  fill="#060609"/>
  <rect x="616"  y="754" width="5"   height="28"  fill="#060609"/>
  <rect x="671"  y="754" width="5"   height="28"  fill="#060609"/>

  <!-- Row 2 -->
  <rect x="355"  y="830" width="90"  height="48"  fill="#08080f"/>
  <rect x="528"  y="830" width="90"  height="48"  fill="#07070e"/>
  <rect x="701"  y="830" width="90"  height="48"  fill="#08080f"/>
  <rect x="874"  y="830" width="90"  height="48"  fill="#07070e"/>
  <rect x="1047" y="830" width="90"  height="48"  fill="#08080f"/>
  <rect x="1220" y="830" width="90"  height="48"  fill="#07070e"/>
  <rect x="1393" y="830" width="90"  height="48"  fill="#08080f"/>
  <!-- Legs -->
  <rect x="360"  y="878" width="6"   height="38"  fill="#060609"/>
  <rect x="435"  y="878" width="6"   height="38"  fill="#060609"/>
  <rect x="533"  y="878" width="6"   height="38"  fill="#060609"/>
  <rect x="608"  y="878" width="6"   height="38"  fill="#060609"/>

  <!-- Row 1 (closest, partial) -->
  <rect x="200"  y="975" width="118" height="55"  fill="#090910"/>
  <rect x="406"  y="975" width="118" height="55"  fill="#08080f"/>
  <rect x="612"  y="975" width="118" height="55"  fill="#090910"/>
  <rect x="818"  y="975" width="118" height="55"  fill="#08080f"/>
  <rect x="1024" y="975" width="118" height="55"  fill="#090910"/>
  <rect x="1230" y="975" width="118" height="55"  fill="#08080f"/>
  <rect x="1436" y="975" width="118" height="55"  fill="#090910"/>

  <!-- ── THE LONE CHAIR (story element: out of place, near front) ──────── -->
  <!-- This chair is facing the viewer, pulled away from its desk — wrong -->
  <!-- Chair seat -->
  <rect x="686"  y="620" width="50"  height="38"  fill="#0c0c18" rx="1"/>
  <!-- Chair back -->
  <rect x="686"  y="584" width="50"  height="40"  fill="#0a0a14" rx="1"/>
  <!-- Chair legs -->
  <rect x="689"  y="658" width="5"   height="38"  fill="#080810"/>
  <rect x="729"  y="658" width="5"   height="38"  fill="#080810"/>
  <!-- Small shadow beneath chair -->
  <ellipse cx="711" cy="698" rx="28" ry="6"       fill="#020206" opacity="0.6"/>

  <!-- Floor perspective lines -->
  <line x1="960" y1="420" x2="0"    y2="1080" stroke="#05050c" stroke-width="1.2"/>
  <line x1="960" y1="420" x2="480"  y2="1080" stroke="#04040b" stroke-width="0.8"/>
  <line x1="960" y1="420" x2="960"  y2="1080" stroke="#06060d" stroke-width="1.5"/>
  <line x1="960" y1="420" x2="1440" y2="1080" stroke="#04040b" stroke-width="0.8"/>
  <line x1="960" y1="420" x2="1920" y2="1080" stroke="#05050c" stroke-width="1.2"/>

  <!-- Darkness vignette -->
  <rect width="1920" height="1080" fill="#000004" opacity="0.24"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!--
    Empty night classroom — desk rows, moonbeam across floor,
    blackboard on far wall, one chair pulled out of place.
  -->
  <defs>
    <linearGradient id="moonBeam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#2030a0" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#101870" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#161620"/>
      <stop offset="100%" stop-color="#0e0e18"/>
    </linearGradient>
    <linearGradient id="boardG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0e1a18"/>
      <stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
    <radialGradient id="moonWindowGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#202888" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#060618"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
  </defs>

  <!-- Base room color (walls) -->
  <rect width="1920" height="1080" fill="#141420"/>

  <!-- Back wall -->
  <rect x="0" y="0" width="1920" height="600" fill="#161624"/>

  <!-- BLACKBOARD -->
  <rect x="180" y="60" width="1560" height="380" fill="url(#boardG)" rx="4"/>
  <rect x="185" y="65" width="1550" height="370" fill="#0e1c18" rx="3"/>
  <!-- Board trim -->
  <rect x="175" y="55"  width="1570" height="10"  fill="#1e2a28"/>
  <rect x="175" y="435" width="1570" height="12"  fill="#1e2a28"/>
  <rect x="175" y="55"  width="10"   height="392" fill="#1e2a28"/>
  <rect x="1735" y="55" width="10"   height="392" fill="#1e2a28"/>
  <!-- Chalk ledge -->
  <rect x="175" y="444" width="1570" height="18"  fill="#242e2a"/>
  <!-- Chalk writing (faint, ghostly) -->
  <line x1="280"  y1="180" x2="480"  y2="180" stroke="#1e2a24" stroke-width="3" opacity="0.6"/>
  <line x1="280"  y1="210" x2="580"  y2="210" stroke="#1e2a24" stroke-width="2" opacity="0.5"/>
  <line x1="280"  y1="240" x2="420"  y2="240" stroke="#1e2a24" stroke-width="2" opacity="0.4"/>
  <!-- "出席番号" suggestion -->
  <rect x="1450" y="100" width="220" height="120" fill="#0c1814" opacity="0.5"/>
  <line x1="1455" y1="130" x2="1665" y2="130" stroke="#182018" stroke-width="2" opacity="0.5"/>
  <line x1="1455" y1="160" x2="1665" y2="160" stroke="#182018" stroke-width="2" opacity="0.4"/>
  <line x1="1455" y1="190" x2="1665" y2="190" stroke="#182018" stroke-width="2" opacity="0.4"/>

  <!-- Floor -->
  <rect x="0" y="600" width="1920" height="480" fill="url(#floor)"/>
  <!-- Floor boards (horizontal lines) -->
  <line x1="0" y1="680" x2="1920" y2="680" stroke="#1a1a28" stroke-width="1.5"/>
  <line x1="0" y1="760" x2="1920" y2="760" stroke="#181826" stroke-width="1.5"/>
  <line x1="0" y1="840" x2="1920" y2="840" stroke="#1a1a28" stroke-width="1"/>
  <line x1="0" y1="920" x2="1920" y2="920" stroke="#181826" stroke-width="1"/>
  <line x1="0" y1="1000" x2="1920" y2="1000" stroke="#1a1a28" stroke-width="1"/>

  <!-- RIGHT WINDOWS -->
  <!-- Large window -->
  <rect x="1560" y="80"  width="330" height="440" fill="url(#nightSky)"/>
  <rect x="1565" y="85"  width="320" height="430" fill="#080818"/>
  <!-- Moon visible through window -->
  <circle cx="1780" cy="130" r="34" fill="#c0a850"/>
  <circle cx="1780" cy="130" r="28" fill="#d0b860"/>
  <!-- Stars in window -->
  <circle cx="1590" cy="110" r="1.5" fill="#c8c0e0" opacity="0.7"/>
  <circle cx="1640" cy="95"  r="1.5" fill="#c8c0e0" opacity="0.65"/>
  <circle cx="1700" cy="130" r="1.2" fill="#c8c0e0" opacity="0.6"/>
  <circle cx="1840" cy="95"  r="1.5" fill="#c8c0e0" opacity="0.7"/>
  <!-- Window glow -->
  <ellipse cx="1730" cy="180" rx="250" ry="200" fill="url(#moonWindowGlow)"/>
  <!-- Window frame -->
  <rect x="1558" y="78"  width="8"   height="446" fill="#222232"/>
  <rect x="1886" y="78"  width="8"   height="446" fill="#222232"/>
  <rect x="1558" y="78"  width="338" height="8"   fill="#222232"/>
  <rect x="1558" y="520" width="338" height="8"   fill="#222232"/>
  <!-- Crossbars -->
  <rect x="1558" y="300" width="338" height="5"   fill="#1e1e2e"/>
  <rect x="1724" y="78"  width="5"   height="450" fill="#1e1e2e"/>
  <!-- Window sill -->
  <rect x="1545" y="524" width="350" height="16"  fill="#282840"/>

  <!-- Small window (upper left area) -->
  <rect x="32"   y="80"  width="220" height="300" fill="url(#nightSky)"/>
  <rect x="37"   y="85"  width="210" height="290" fill="#080818"/>
  <rect x="30"   y="78"  width="8"   height="308" fill="#222232"/>
  <rect x="248"  y="78"  width="8"   height="308" fill="#222232"/>
  <rect x="30"   y="78"  width="228" height="8"   fill="#222232"/>
  <rect x="30"   y="382" width="228" height="8"   fill="#222232"/>
  <rect x="30"   y="228" width="228" height="4"   fill="#1e1e2e"/>
  <rect x="140"  y="78"  width="4"   height="312" fill="#1e1e2e"/>
  <!-- Star in small window -->
  <circle cx="80"  cy="130" r="1.5" fill="#c8c0e0" opacity="0.65"/>
  <circle cx="200" cy="110" r="1.5" fill="#c8c0e0" opacity="0.6"/>

  <!-- MOONLIGHT BEAM (diagonal from right window) -->
  <polygon points="1560,86 1894,86 1920,640 1300,1080 800,1080"
           fill="url(#moonBeam)"/>

  <!-- CEILING LIGHTS -->
  <!-- Main fixture left -->
  <rect x="300" y="30" width="360" height="20"  fill="#242440" rx="3"/>
  <rect x="305" y="33" width="350" height="13"  fill="#a0a0c8" opacity="0.8"/>
  <!-- Main fixture right -->
  <rect x="1260" y="30" width="360" height="20"  fill="#242440" rx="3"/>
  <rect x="1265" y="33" width="350" height="13"  fill="#a0a0c8" opacity="0.8"/>
  <!-- Wires -->
  <line x1="480"  y1="0" x2="480"  y2="30" stroke="#1e1e30" stroke-width="2"/>
  <line x1="1440" y1="0" x2="1440" y2="30" stroke="#1e1e30" stroke-width="2"/>

  <!-- DESKS — rows of dark rectangles in perspective -->
  <!-- Row 1 (furthest) -->
  <rect x="300"  y="540" width="80"  height="55" fill="#1c1c2c" rx="2"/>
  <rect x="440"  y="540" width="80"  height="55" fill="#1c1c2c" rx="2"/>
  <rect x="580"  y="540" width="80"  height="55" fill="#1c1c2c" rx="2"/>
  <rect x="720"  y="540" width="80"  height="55" fill="#1c1c2c" rx="2"/>
  <rect x="860"  y="540" width="80"  height="55" fill="#1c1c2c" rx="2"/>
  <rect x="1000" y="540" width="80"  height="55" fill="#1c1c2c" rx="2"/>
  <rect x="1140" y="540" width="80"  height="55" fill="#1c1c2c" rx="2"/>
  <rect x="1280" y="540" width="80"  height="55" fill="#1c1c2c" rx="2"/>
  <!-- Chairs behind row 1 desks -->
  <rect x="310"  y="596" width="62"  height="38" fill="#181826" rx="2"/>
  <rect x="450"  y="596" width="62"  height="38" fill="#181826" rx="2"/>
  <rect x="590"  y="596" width="62"  height="38" fill="#181826" rx="2"/>
  <rect x="730"  y="596" width="62"  height="38" fill="#181826" rx="2"/>
  <rect x="870"  y="596" width="62"  height="38" fill="#181826" rx="2"/>
  <rect x="1010" y="596" width="62"  height="38" fill="#181826" rx="2"/>
  <rect x="1150" y="596" width="62"  height="38" fill="#181826" rx="2"/>
  <rect x="1290" y="596" width="62"  height="38" fill="#181826" rx="2"/>

  <!-- Row 2 (middle) -->
  <rect x="260"  y="648" width="100" height="68" fill="#202030" rx="2"/>
  <rect x="420"  y="648" width="100" height="68" fill="#202030" rx="2"/>
  <rect x="580"  y="648" width="100" height="68" fill="#202030" rx="2"/>
  <rect x="740"  y="648" width="100" height="68" fill="#202030" rx="2"/>
  <rect x="900"  y="648" width="100" height="68" fill="#202030" rx="2"/>
  <rect x="1060" y="648" width="100" height="68" fill="#202030" rx="2"/>
  <rect x="1220" y="648" width="100" height="68" fill="#202030" rx="2"/>
  <rect x="1380" y="648" width="100" height="68" fill="#202030" rx="2"/>
  <!-- Chairs row 2 -->
  <rect x="270"  y="718" width="80"  height="48" fill="#1c1c2a" rx="2"/>
  <rect x="430"  y="718" width="80"  height="48" fill="#1c1c2a" rx="2"/>
  <rect x="590"  y="718" width="80"  height="48" fill="#1c1c2a" rx="2"/>
  <rect x="750"  y="718" width="80"  height="48" fill="#1c1c2a" rx="2"/>
  <rect x="910"  y="718" width="80"  height="48" fill="#1c1c2a" rx="2"/>
  <rect x="1070" y="718" width="80"  height="48" fill="#1c1c2a" rx="2"/>
  <rect x="1230" y="718" width="80"  height="48" fill="#1c1c2a" rx="2"/>
  <rect x="1390" y="718" width="80"  height="48" fill="#1c1c2a" rx="2"/>

  <!-- Row 3 (front, large) -->
  <rect x="200"  y="790" width="130" height="88" fill="#242438" rx="2"/>
  <rect x="400"  y="790" width="130" height="88" fill="#242438" rx="2"/>
  <rect x="600"  y="790" width="130" height="88" fill="#242438" rx="2"/>
  <rect x="800"  y="790" width="130" height="88" fill="#242438" rx="2"/>
  <rect x="1000" y="790" width="130" height="88" fill="#242438" rx="2"/>
  <rect x="1200" y="790" width="130" height="88" fill="#242438" rx="2"/>
  <rect x="1400" y="790" width="130" height="88" fill="#242438" rx="2"/>
  <rect x="1600" y="790" width="130" height="88" fill="#242438" rx="2"/>
  <!-- Chairs row 3 -->
  <rect x="210"  y="880" width="110" height="65" fill="#202034" rx="2"/>
  <rect x="410"  y="880" width="110" height="65" fill="#202034" rx="2"/>
  <rect x="610"  y="880" width="110" height="65" fill="#202034" rx="2"/>
  <rect x="810"  y="880" width="110" height="65" fill="#202034" rx="2"/>
  <rect x="1010" y="880" width="110" height="65" fill="#202034" rx="2"/>
  <rect x="1210" y="880" width="110" height="65" fill="#202034" rx="2"/>
  <rect x="1410" y="880" width="110" height="65" fill="#202034" rx="2"/>
  <rect x="1610" y="880" width="110" height="65" fill="#202034" rx="2"/>

  <!-- THE PULLED-OUT CHAIR (story element) — row 2, one chair is away from desk -->
  <!-- Pulled out desk (the chair is away from desk 1060,648) -->
  <rect x="1060" y="648" width="100" height="68" fill="#1a1a28" rx="2"/>
  <!-- Chair pulled to the side and rotated slightly -->
  <rect x="1040" y="740" width="80"  height="48" fill="#2a2a3e" rx="2" transform="rotate(-8 1080 764)"/>
  <!-- Slight moonbeam highlight on pulled chair -->
  <rect x="1040" y="740" width="80"  height="8"  fill="#303050" opacity="0.4" rx="2"/>

  <!-- Vignette -->
  <rect width="1920" height="1080" fill="#000008" opacity="0.2"/>
</svg>

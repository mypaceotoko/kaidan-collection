<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="ceilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2a"/>
      <stop offset="100%" stop-color="#222030"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#28241e"/>
      <stop offset="100%" stop-color="#2a2620"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2448"/>
      <stop offset="50%" stop-color="#2a3060"/>
      <stop offset="100%" stop-color="#3a3040"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#221e14"/>
      <stop offset="100%" stop-color="#1a1610"/>
    </linearGradient>
    <linearGradient id="plankDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#201c12"/>
      <stop offset="100%" stop-color="#1c1810"/>
    </linearGradient>
    <linearGradient id="plankLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2418"/>
      <stop offset="100%" stop-color="#221e14"/>
    </linearGradient>
    <radialGradient id="winFloorGlow" cx="85%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#c08030" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c08030" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sofaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3424"/>
      <stop offset="100%" stop-color="#2e2a1c"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="40%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- CEILING -->
  <rect x="0" y="0" width="1920" height="150" fill="url(#ceilGrad)"/>
  <rect x="0" y="146" width="1920" height="4" fill="#0e0e18"/>

  <!-- BACK WALL -->
  <rect x="0" y="150" width="1920" height="670" fill="url(#wallGrad)"/>

  <!-- FLOOR base -->
  <rect x="0" y="820" width="1920" height="260" fill="url(#floorGrad)"/>

  <!-- Floor wood planks alternating -->
  <rect x="0" y="820" width="1920" height="16" fill="url(#plankLight)"/>
  <rect x="0" y="836" width="1920" height="16" fill="url(#plankDark)"/>
  <rect x="0" y="852" width="1920" height="16" fill="url(#plankLight)"/>
  <rect x="0" y="868" width="1920" height="16" fill="url(#plankDark)"/>
  <rect x="0" y="884" width="1920" height="16" fill="url(#plankLight)"/>
  <rect x="0" y="900" width="1920" height="16" fill="url(#plankDark)"/>
  <rect x="0" y="916" width="1920" height="16" fill="url(#plankLight)"/>
  <rect x="0" y="932" width="1920" height="16" fill="url(#plankDark)"/>
  <rect x="0" y="948" width="1920" height="16" fill="url(#plankLight)"/>
  <rect x="0" y="964" width="1920" height="16" fill="url(#plankDark)"/>
  <rect x="0" y="980" width="1920" height="16" fill="url(#plankLight)"/>
  <rect x="0" y="996" width="1920" height="16" fill="url(#plankDark)"/>
  <rect x="0" y="1012" width="1920" height="16" fill="url(#plankLight)"/>
  <rect x="0" y="1028" width="1920" height="16" fill="url(#plankDark)"/>
  <rect x="0" y="1044" width="1920" height="36" fill="url(#plankLight)"/>
  <!-- Plank seam vertical lines -->
  <line x1="320" y1="820" x2="320" y2="1080" stroke="#0e0c08" stroke-width="1.5" opacity="0.6"/>
  <line x1="640" y1="820" x2="640" y2="1080" stroke="#0e0c08" stroke-width="1.5" opacity="0.6"/>
  <line x1="960" y1="820" x2="960" y2="1080" stroke="#0e0c08" stroke-width="1.5" opacity="0.6"/>
  <line x1="1280" y1="820" x2="1280" y2="1080" stroke="#0e0c08" stroke-width="1.5" opacity="0.6"/>
  <line x1="1600" y1="820" x2="1600" y2="1080" stroke="#0e0c08" stroke-width="1.5" opacity="0.6"/>
  <!-- floor/wall join -->
  <rect x="0" y="818" width="1920" height="4" fill="#0e0e18"/>
  <!-- Baseboard -->
  <rect x="0" y="806" width="1920" height="16" fill="#2a2620"/>
  <rect x="0" y="804" width="1920" height="4" fill="#383430"/>

  <!-- WINDOW (right) -->
  <rect x="1340" y="190" width="470" height="590" fill="#302c26" rx="2"/>
  <rect x="1356" y="206" width="438" height="558" fill="url(#skyGrad)"/>
  <!-- Cloud shapes in sky -->
  <ellipse cx="1490" cy="270" rx="100" ry="28" fill="#343858" opacity="0.7"/>
  <ellipse cx="1660" cy="300" rx="80" ry="22" fill="#343858" opacity="0.6"/>
  <ellipse cx="1560" cy="340" rx="120" ry="30" fill="#2e3250" opacity="0.5"/>
  <ellipse cx="1430" cy="370" rx="90" ry="24" fill="#383c5a" opacity="0.5"/>
  <ellipse cx="1640" cy="390" rx="70" ry="18" fill="#343858" opacity="0.4"/>
  <!-- Horizon amber glow in sky -->
  <rect x="1356" y="640" width="438" height="124" fill="#3a3020" opacity="0.55"/>
  <!-- Window cross dividers -->
  <rect x="1568" y="206" width="10" height="558" fill="#302c26"/>
  <rect x="1356" y="490" width="438" height="10" fill="#302c26"/>
  <!-- Window sill -->
  <rect x="1326" y="792" width="494" height="22" fill="#302c26" rx="2"/>
  <rect x="1326" y="792" width="494" height="5" fill="#3c3832"/>

  <!-- Window light glow on floor -->
  <rect x="0" y="820" width="1920" height="260" fill="url(#winFloorGlow)"/>
  <!-- Warm ambient from window on wall -->
  <ellipse cx="1570" cy="820" rx="400" ry="300" fill="#c08030" opacity="0.06"/>

  <!-- CEILING LIGHT FIXTURE (off) -->
  <ellipse cx="960" cy="148" rx="55" ry="14" fill="#2e2a26"/>
  <rect x="956" y="150" width="8" height="32" fill="#2a2622"/>
  <ellipse cx="960" cy="185" rx="48" ry="16" fill="#2e2a26"/>
  <ellipse cx="960" cy="190" rx="40" ry="10" fill="#262220"/>

  <!-- TV UNIT (left wall) -->
  <!-- TV stand -->
  <rect x="70" y="650" width="400" height="185" fill="#282020" rx="4"/>
  <rect x="70" y="720" width="400" height="6" fill="#201818"/>
  <rect x="110" y="832" width="24" height="38" fill="#1e1818"/>
  <rect x="436" y="832" width="24" height="38" fill="#1e1818"/>
  <!-- TV body -->
  <rect x="90" y="400" width="380" height="255" fill="#1e1a20" rx="6"/>
  <rect x="100" y="410" width="360" height="235" fill="#161218" rx="4"/>
  <!-- TV screen -->
  <rect x="108" y="418" width="344" height="220" fill="#0c0c14" rx="2"/>
  <!-- Subtle reflection on screen -->
  <polygon points="108,418 200,418 108,480" fill="#14141e" opacity="0.4"/>
  <!-- Standby LED -->
  <circle cx="280" cy="648" r="3" fill="#881a10" opacity="0.8"/>
  <!-- Items on stand shelf -->
  <rect x="100" y="728" width="75" height="28" fill="#221e1e" rx="2"/>
  <rect x="310" y="728" width="50" height="28" fill="#1e1c1c" rx="2"/>

  <!-- COFFEE TABLE -->
  <rect x="610" y="790" width="640" height="22" fill="#282018" rx="3"/>
  <rect x="610" y="790" width="640" height="5" fill="#342c20"/>
  <rect x="628" y="812" width="22" height="50" fill="#1e1810"/>
  <rect x="1208" y="812" width="22" height="50" fill="#1e1810"/>
  <!-- Table crossbar -->
  <rect x="640" y="850" width="580" height="8" fill="#201c12" rx="2"/>
  <!-- Mug on table -->
  <rect x="860" y="768" width="30" height="24" fill="#2c2820" rx="3"/>
  <rect x="856" y="765" width="38" height="5" fill="#342e26" rx="2"/>
  <!-- Remote on table -->
  <rect x="960" y="772" width="58" height="18" fill="#242020" rx="3"/>

  <!-- SOFA (3-seater) -->
  <!-- Sofa back -->
  <rect x="520" y="565" width="800" height="240" fill="#2a2818" rx="8"/>
  <rect x="520" y="565" width="800" height="8" fill="#38341e"/>
  <!-- Back cushions (3) -->
  <rect x="534" y="580" width="244" height="208" fill="url(#sofaGrad)" rx="6"/>
  <rect x="793" y="580" width="244" height="208" fill="url(#sofaGrad)" rx="6"/>
  <rect x="1052" y="580" width="244" height="208" fill="url(#sofaGrad)" rx="6"/>
  <line x1="788" y1="580" x2="788" y2="788" stroke="#201e12" stroke-width="3"/>
  <line x1="1047" y1="580" x2="1047" y2="788" stroke="#201e12" stroke-width="3"/>
  <!-- Seat -->
  <rect x="520" y="775" width="800" height="100" fill="#2e2a1c" rx="4"/>
  <!-- Seat cushions -->
  <rect x="528" y="782" width="256" height="86" fill="#342e20" rx="3"/>
  <rect x="792" y="782" width="256" height="86" fill="#342e20" rx="3"/>
  <rect x="1056" y="782" width="256" height="86" fill="#342e20" rx="3"/>
  <!-- Arm rests -->
  <rect x="498" y="572" width="44" height="260" fill="#2e2c1c" rx="6"/>
  <rect x="498" y="572" width="44" height="10" fill="#3c3826"/>
  <rect x="1298" y="572" width="44" height="260" fill="#2e2c1c" rx="6"/>
  <rect x="1298" y="572" width="44" height="10" fill="#3c3826"/>
  <!-- Throw pillow -->
  <rect x="1262" y="585" width="80" height="96" fill="#3a3022" rx="6"/>
  <!-- Sofa shadow under -->
  <ellipse cx="920" cy="872" rx="380" ry="18" fill="#0e0e18" opacity="0.5"/>

  <!-- WALL CLOCK (right wall) -->
  <circle cx="1240" cy="360" r="58" fill="#201e18"/>
  <circle cx="1240" cy="360" r="52" fill="#c0b890"/>
  <circle cx="1240" cy="360" r="48" fill="#b8b080"/>
  <!-- Hour markers -->
  <line x1="1240" y1="314" x2="1240" y2="326" stroke="#1e1c10" stroke-width="3.5"/>
  <line x1="1286" y1="360" x2="1274" y2="360" stroke="#1e1c10" stroke-width="3.5"/>
  <line x1="1240" y1="406" x2="1240" y2="394" stroke="#1e1c10" stroke-width="3.5"/>
  <line x1="1194" y1="360" x2="1206" y2="360" stroke="#1e1c10" stroke-width="3.5"/>
  <!-- Minor markers -->
  <line x1="1216" y1="318" x2="1219" y2="324" stroke="#1e1c10" stroke-width="2"/>
  <line x1="1200" y1="336" x2="1206" y2="339" stroke="#1e1c10" stroke-width="2"/>
  <line x1="1200" y1="384" x2="1206" y2="381" stroke="#1e1c10" stroke-width="2"/>
  <line x1="1216" y1="402" x2="1219" y2="396" stroke="#1e1c10" stroke-width="2"/>
  <line x1="1264" y1="402" x2="1261" y2="396" stroke="#1e1c10" stroke-width="2"/>
  <line x1="1280" y1="384" x2="1274" y2="381" stroke="#1e1c10" stroke-width="2"/>
  <line x1="1280" y1="336" x2="1274" y2="339" stroke="#1e1c10" stroke-width="2"/>
  <line x1="1264" y1="318" x2="1261" y2="324" stroke="#1e1c10" stroke-width="2"/>
  <!-- Hour hand (~4 o'clock) -->
  <line x1="1240" y1="360" x2="1268" y2="383" stroke="#1a1810" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="1240" y1="360" x2="1227" y2="320" stroke="#1a1810" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="1240" cy="360" r="5" fill="#1e1c10"/>
  <circle cx="1240" cy="360" r="58" fill="none" stroke="#181610" stroke-width="4"/>

  <!-- Vignette -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>
</svg>

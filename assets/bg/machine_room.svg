<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="roomGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#070809"/>
      <stop offset="100%" stop-color="#050607"/>
    </linearGradient>
    <!-- Server rack LED glow (blue-green) -->
    <radialGradient id="ledGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#0a2030" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a2030" stop-opacity="0"/>
    </radialGradient>
    <!-- Danger indicator glow (amber, something wrong) -->
    <radialGradient id="warnGlow" cx="75%" cy="50%" r="35%">
      <stop offset="0%"   stop-color="#302010" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#302010" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="62%">
      <stop offset="20%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.92"/>
    </radialGradient>
  </defs>

  <!-- Base: very dark industrial -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#roomGrad)"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#ledGlow)"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#warnGlow)"/>

  <!-- Ceiling (low industrial) -->
  <rect x="0" y="0" width="1920" height="120" fill="#060708"/>
  <!-- Ceiling cable trays -->
  <rect x="0"   y="80" width="1920" height="16" fill="#080a0c" rx="1"/>
  <!-- Conduit pipes on ceiling -->
  <rect x="200" y="40" width="1520" height="12" fill="#0a0c10" rx="3"/>
  <rect x="200" y="58" width="1520" height="8"  fill="#080a0e" rx="2"/>

  <!-- Left wall -->
  <rect x="0"   y="120" width="220" height="960" fill="#080a0c"/>
  <!-- Right wall -->
  <rect x="1700" y="120" width="220" height="960" fill="#080a0c"/>
  <!-- Back wall -->
  <rect x="220" y="120" width="1480" height="960" fill="#070809"/>

  <!-- SERVER RACKS — LEFT BANK (3 racks) -->
  <!-- Rack 1 -->
  <rect x="240"  y="140" width="240" height="840" fill="#0c0e10" rx="2"/>
  <rect x="248"  y="148" width="224" height="824" fill="#0a0c0e" rx="1"/>
  <!-- Rack units with LEDs -->
  <rect x="254" y="156" width="212" height="20" fill="#0d0f12" rx="1"/>
  <ellipse cx="270" cy="166" rx="4" ry="4" fill="#20c060" opacity="0.7"/>
  <ellipse cx="284" cy="166" rx="4" ry="4" fill="#20c060" opacity="0.65"/>
  <rect x="254" y="182" width="212" height="20" fill="#0e1014" rx="1"/>
  <ellipse cx="270" cy="192" rx="4" ry="4" fill="#20c060" opacity="0.7"/>
  <ellipse cx="284" cy="192" rx="4" ry="4" fill="#c08020" opacity="0.5"/>
  <rect x="254" y="208" width="212" height="20" fill="#0d0f12" rx="1"/>
  <ellipse cx="270" cy="218" rx="4" ry="4" fill="#20c060" opacity="0.65"/>
  <rect x="254" y="234" width="212" height="20" fill="#0e1014" rx="1"/>
  <ellipse cx="270" cy="244" rx="4" ry="4" fill="#20c060" opacity="0.7"/>
  <rect x="254" y="260" width="212" height="20" fill="#0d0f12" rx="1"/>
  <ellipse cx="270" cy="270" rx="4" ry="4" fill="#c03030" opacity="0.6"/>
  <ellipse cx="284" cy="270" rx="4" ry="4" fill="#c03030" opacity="0.5"/>
  <rect x="254" y="286" width="212" height="20" fill="#0e1014" rx="1"/>
  <ellipse cx="270" cy="296" rx="4" ry="4" fill="#20c060" opacity="0.6"/>
  <rect x="254" y="312" width="212" height="306" fill="#0c0e10"/>
  <!-- Drive bays in lower rack -->
  <rect x="258" y="320" width="200" height="16" fill="#0e1014" rx="1"/>
  <rect x="258" y="342" width="200" height="16" fill="#0e1014" rx="1"/>
  <rect x="258" y="364" width="200" height="16" fill="#0e1014" rx="1"/>
  <rect x="258" y="386" width="200" height="16" fill="#0e1014" rx="1"/>
  <!-- Fan vents bottom -->
  <rect x="260" y="700" width="196" height="50" fill="#0c0e10"/>
  <line x1="264" y1="710" x2="452" y2="710" stroke="#101418" stroke-width="2" opacity="0.4"/>
  <line x1="264" y1="722" x2="452" y2="722" stroke="#101418" stroke-width="2" opacity="0.4"/>
  <line x1="264" y1="734" x2="452" y2="734" stroke="#101418" stroke-width="2" opacity="0.35"/>

  <!-- Rack 2 -->
  <rect x="500"  y="140" width="240" height="840" fill="#0c0e10" rx="2"/>
  <rect x="508"  y="148" width="224" height="824" fill="#0a0c0e" rx="1"/>
  <rect x="514" y="156" width="212" height="20" fill="#0d0f12" rx="1"/>
  <ellipse cx="530" cy="166" rx="4" ry="4" fill="#20c060" opacity="0.7"/>
  <rect x="514" y="182" width="212" height="20" fill="#0e1014" rx="1"/>
  <ellipse cx="530" cy="192" rx="4" ry="4" fill="#20c060" opacity="0.65"/>
  <ellipse cx="544" cy="192" rx="4" ry="4" fill="#20c060" opacity="0.6"/>
  <rect x="514" y="208" width="212" height="20" fill="#0d0f12" rx="1"/>
  <ellipse cx="530" cy="218" rx="4" ry="4" fill="#c08020" opacity="0.55"/>
  <rect x="514" y="234" width="212" height="554" fill="#0c0e10"/>

  <!-- Rack 3 -->
  <rect x="760"  y="140" width="240" height="840" fill="#0c0e10" rx="2"/>
  <rect x="768"  y="148" width="224" height="824" fill="#0a0c0e" rx="1"/>
  <rect x="774" y="156" width="212" height="20" fill="#0d0f12" rx="1"/>
  <ellipse cx="790" cy="166" rx="4" ry="4" fill="#20c060" opacity="0.7"/>
  <rect x="774" y="182" width="212" height="606" fill="#0c0e10"/>
  <!-- Cable management panel -->
  <rect x="768" y="800" width="224" height="80" fill="#0d0f12"/>
  <line x1="774" y1="820" x2="988" y2="820" stroke="#141820" stroke-width="3" opacity="0.5"/>
  <line x1="774" y1="836" x2="988" y2="836" stroke="#141820" stroke-width="3" opacity="0.45"/>
  <line x1="774" y1="852" x2="988" y2="852" stroke="#141820" stroke-width="3" opacity="0.4"/>

  <!-- CABLE MANAGEMENT — hanging cables between racks -->
  <!-- Cable bundles from rack tops -->
  <path d="M 360 148 Q 430 120 500 148" stroke="#0e1418" stroke-width="6" fill="none" opacity="0.7"/>
  <path d="M 370 148 Q 440 115 510 148" stroke="#0e1418" stroke-width="4" fill="none" opacity="0.6"/>
  <path d="M 620 148 Q 690 120 760 148" stroke="#0e1418" stroke-width="6" fill="none" opacity="0.7"/>
  <path d="M 880 148 Q 960 115 1040 148" stroke="#0e1418" stroke-width="5" fill="none" opacity="0.6"/>

  <!-- HVAC UNIT (right side) -->
  <!-- Large unit box -->
  <rect x="1200" y="200" width="460" height="680" fill="#0a0c0e" rx="3"/>
  <rect x="1210" y="210" width="440" height="660" fill="#080a0c" rx="2"/>
  <!-- HVAC grille (front) -->
  <rect x="1220" y="220" width="420" height="360" fill="#0c0e10"/>
  <!-- Grille slats -->
  <line x1="1220" y1="240" x2="1640" y2="240" stroke="#101418" stroke-width="3" opacity="0.45"/>
  <line x1="1220" y1="260" x2="1640" y2="260" stroke="#101418" stroke-width="3" opacity="0.4"/>
  <line x1="1220" y1="280" x2="1640" y2="280" stroke="#101418" stroke-width="3" opacity="0.45"/>
  <line x1="1220" y1="300" x2="1640" y2="300" stroke="#101418" stroke-width="3" opacity="0.4"/>
  <line x1="1220" y1="320" x2="1640" y2="320" stroke="#101418" stroke-width="3" opacity="0.45"/>
  <line x1="1220" y1="340" x2="1640" y2="340" stroke="#101418" stroke-width="3" opacity="0.4"/>
  <line x1="1220" y1="360" x2="1640" y2="360" stroke="#101418" stroke-width="3" opacity="0.45"/>
  <line x1="1220" y1="380" x2="1640" y2="380" stroke="#101418" stroke-width="3" opacity="0.4"/>
  <line x1="1220" y1="400" x2="1640" y2="400" stroke="#101418" stroke-width="3" opacity="0.45"/>
  <line x1="1220" y1="420" x2="1640" y2="420" stroke="#101418" stroke-width="3" opacity="0.4"/>
  <line x1="1220" y1="440" x2="1640" y2="440" stroke="#101418" stroke-width="3" opacity="0.45"/>
  <line x1="1220" y1="460" x2="1640" y2="460" stroke="#101418" stroke-width="3" opacity="0.4"/>
  <line x1="1220" y1="480" x2="1640" y2="480" stroke="#101418" stroke-width="3" opacity="0.45"/>
  <line x1="1220" y1="500" x2="1640" y2="500" stroke="#101418" stroke-width="3" opacity="0.4"/>
  <line x1="1220" y1="520" x2="1640" y2="520" stroke="#101418" stroke-width="3" opacity="0.45"/>
  <line x1="1220" y1="540" x2="1640" y2="540" stroke="#101418" stroke-width="3" opacity="0.4"/>
  <line x1="1220" y1="560" x2="1640" y2="560" stroke="#101418" stroke-width="3" opacity="0.45"/>
  <!-- HVAC control panel -->
  <rect x="1220" y="590" width="420" height="100" fill="#0d0f12"/>
  <!-- Control LEDs (amber — warning) -->
  <ellipse cx="1260" cy="640" rx="8" ry="8" fill="#c08020" opacity="0.65"/>
  <ellipse cx="1290" cy="640" rx="8" ry="8" fill="#c08020" opacity="0.55"/>
  <ellipse cx="1320" cy="640" rx="8" ry="8" fill="#c03030" opacity="0.6"/>
  <!-- Temperature display -->
  <rect x="1380" y="618" width="100" height="44" fill="#080a0c" rx="2"/>
  <rect x="1386" y="622" width="88"  height="36" fill="#0a1018" rx="1"/>
  <!-- Digits: high temp -->
  <rect x="1394" y="630" width="30" height="20" fill="#c08020" opacity="0.5"/>
  <rect x="1430" y="630" width="30" height="20" fill="#c08020" opacity="0.5"/>

  <!-- PIPES on back wall -->
  <!-- Vertical pipe 1 -->
  <rect x="1090" y="120" width="30" height="960" fill="#0e1014" rx="4"/>
  <rect x="1098" y="120" width="14" height="960" fill="#0c0e12" opacity="0.7"/>
  <!-- Pipe elbow -->
  <ellipse cx="1105" cy="960" rx="22" ry="16" fill="#0e1014"/>
  <!-- Horizontal pipe from elbow -->
  <rect x="1105" y="948" width="200" height="24" fill="#0e1014" rx="4"/>

  <!-- Vertical pipe 2 (smaller) -->
  <rect x="1150" y="120" width="18" height="600" fill="#0c0e10" rx="3"/>

  <!-- FLOOR: industrial anti-slip -->
  <rect x="0" y="980" width="1920" height="100" fill="#070809"/>
  <rect x="0" y="980" width="1920" height="3" fill="#101418" opacity="0.5"/>
  <!-- Floor cable raceways -->
  <rect x="240" y="983" width="960" height="14" fill="#0c0e10" rx="2"/>

  <!-- DOOR in back wall (where the player must decide) -->
  <rect x="1060" y="360" width="120" height="620" fill="#0c0e10" rx="2"/>
  <rect x="1066" y="366" width="108" height="608" fill="#0a0c0e" rx="1"/>
  <!-- Light leaking under door (horror element) -->
  <rect x="1066" y="966" width="108" height="8" fill="#484858" opacity="0.4"/>
  <!-- Door handle -->
  <rect x="1060" y="660" width="14" height="40" fill="#141820" rx="3"/>
  <!-- Warning sticker on door -->
  <rect x="1088" y="400" width="56" height="40" fill="#4a3010" rx="2" opacity="0.7"/>
  <rect x="1094" y="406" width="44" height="12" fill="#c08020" opacity="0.5"/>

  <!-- Vignette (heavy — dark room) -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>
</svg>

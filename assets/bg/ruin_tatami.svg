<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1810"/>
      <stop offset="100%" stop-color="#141008"/>
    </linearGradient>
    <linearGradient id="tatami" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a2618"/>
      <stop offset="100%" stop-color="#201c10"/>
    </linearGradient>
    <!-- Candle flame glow — the horror element -->
    <radialGradient id="candleGlow" cx="50%" cy="65%" r="40%">
      <stop offset="0%"   stop-color="#e0a030" stop-opacity="0.75"/>
      <stop offset="30%"  stop-color="#b07020" stop-opacity="0.40"/>
      <stop offset="65%"  stop-color="#804010" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#804010" stop-opacity="0"/>
    </radialGradient>
    <!-- Window moonlight -->
    <linearGradient id="moonSlant" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8888a8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8888a8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="20%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.75"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#wallGrad)"/>

  <!-- Ceiling -->
  <rect x="0" y="0" width="1920" height="160" fill="#0e0c08"/>
  <rect x="0" y="158" width="1920" height="4" fill="#0a0806" opacity="0.8"/>
  <!-- Ceiling beam (horizontal) -->
  <rect x="0" y="130" width="1920" height="28" fill="#181408" opacity="0.6"/>

  <!-- Left wall with tokonoma (alcove) -->
  <rect x="0"   y="160" width="400" height="720" fill="#1c1a12"/>
  <!-- Hanging scroll silhouette in alcove -->
  <rect x="60"  y="220" width="120" height="280" fill="#181410" rx="2"/>
  <rect x="68"  y="228" width="104" height="264" fill="#141008" rx="1"/>
  <!-- Scroll rod -->
  <rect x="56"  y="220" width="128" height="10"  fill="#282010" rx="2"/>
  <rect x="56"  y="498" width="128" height="10"  fill="#282010" rx="2"/>
  <!-- Simple ink painting lines on scroll -->
  <line x1="120" y1="250" x2="120" y2="490" stroke="#1e1a0e" stroke-width="2" opacity="0.5"/>
  <ellipse cx="120" cy="300" rx="28" ry="20" fill="none" stroke="#1e1a0e" stroke-width="1.5" opacity="0.4"/>
  <!-- Flower vase in tokonoma -->
  <rect x="148" y="480" width="40" height="60" fill="#241c10" rx="3"/>
  <ellipse cx="168" cy="480" rx="22" ry="10" fill="#2a2216"/>
  <ellipse cx="168" cy="440" rx="12" ry="16" fill="#302818" opacity="0.6"/>

  <!-- Right wall -->
  <rect x="1520" y="160" width="400" height="720" fill="#1c1a12"/>

  <!-- Window (right side, moonlight) -->
  <rect x="1580" y="250" width="280" height="340" fill="#12101a"/>
  <rect x="1590" y="258" width="260" height="324" fill="#0e0c18"/>
  <!-- Window grid (shoji pattern) -->
  <line x1="1720" y1="258" x2="1720" y2="582" stroke="#181620" stroke-width="5"/>
  <line x1="1590" y1="340" x2="1850" y2="340" stroke="#181620" stroke-width="5"/>
  <line x1="1590" y1="420" x2="1850" y2="420" stroke="#181620" stroke-width="5"/>
  <line x1="1590" y1="500" x2="1850" y2="500" stroke="#181620" stroke-width="5"/>
  <!-- Moonlight glow behind window -->
  <rect x="1590" y="258" width="260" height="324" fill="#8888a8" opacity="0.08"/>
  <!-- Moonlight slant onto room from window -->
  <polygon points="1580,258 1840,258 1920,350 1920,600 1840,582 1580,582" fill="url(#moonSlant)"/>

  <!-- Far back wall -->
  <rect x="400" y="160" width="1120" height="720" fill="#181610"/>
  <!-- Sliding door / fusuma (left panel) -->
  <rect x="400"  y="160" width="280" height="720" fill="#1c1a10"/>
  <rect x="408"  y="168" width="264" height="704" fill="#181608"/>
  <rect x="408"  y="168" width="264" height="8"   fill="#1a1808"/>
  <!-- Fusuma handle -->
  <rect x="654"  y="520" width="16"  height="50"  fill="#222018" rx="3"/>
  <!-- Sliding door / fusuma (right panel) -->
  <rect x="1240" y="160" width="280" height="720" fill="#1c1a10"/>
  <rect x="1248" y="168" width="264" height="704" fill="#181608"/>
  <rect x="1248" y="168" width="264" height="8"   fill="#1a1808"/>
  <rect x="1248" y="520" width="16"  height="50"  fill="#222018" rx="3"/>

  <!-- Tatami floor -->
  <rect x="0" y="880" width="1920" height="200" fill="url(#tatami)"/>
  <!-- Tatami mat lines -->
  <rect x="0"   y="880" width="1920" height="4"   fill="#181408" opacity="0.6"/>
  <rect x="640" y="880" width="4"    height="200" fill="#181408" opacity="0.5"/>
  <rect x="1280" y="880" width="4"   height="200" fill="#181408" opacity="0.5"/>
  <!-- Tatami weave texture (very faint horizontal lines) -->
  <rect x="0"   y="895" width="1920" height="2" fill="#222018" opacity="0.25"/>
  <rect x="0"   y="910" width="1920" height="2" fill="#222018" opacity="0.22"/>
  <rect x="0"   y="925" width="1920" height="2" fill="#222018" opacity="0.22"/>
  <rect x="0"   y="940" width="1920" height="2" fill="#222018" opacity="0.2"/>
  <rect x="0"   y="955" width="1920" height="2" fill="#222018" opacity="0.2"/>
  <!-- Dark stain on tatami -->
  <ellipse cx="400"  cy="940" rx="90" ry="40" fill="#100c06" opacity="0.5"/>
  <ellipse cx="1550" cy="960" rx="70" ry="30" fill="#0e0a04" opacity="0.45"/>

  <!-- Candle glow overlay (the horror element — who lit this?) -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#candleGlow)"/>

  <!-- Table (chabudai / low table, overturned to one side) -->
  <!-- Main table top -->
  <rect x="720"  y="810" width="480" height="30"  fill="#2c2418" rx="4" transform="rotate(-4 960 825)"/>
  <!-- Table legs -->
  <rect x="740"  y="838" width="16"  height="50"  fill="#241c14" rx="2" transform="rotate(-4 748 838)"/>
  <rect x="1162" y="838" width="16"  height="50"  fill="#241c14" rx="2" transform="rotate(-4 1170 838)"/>
  <!-- Overturned item (cup) on floor -->
  <ellipse cx="680" cy="882" rx="22" ry="12" fill="#2a2018" opacity="0.8"/>

  <!-- THE CANDLE (still burning) -->
  <!-- Candle holder -->
  <rect x="930"  y="800" width="60"  height="18"  fill="#282018" rx="3"/>
  <ellipse cx="960" cy="800" rx="30" ry="10" fill="#302820"/>
  <!-- Candle wax column -->
  <rect x="944"  y="720" width="32"  height="82"  fill="#c8c0a8" rx="3"/>
  <ellipse cx="960" cy="720" rx="16" ry="7" fill="#d0c8b0"/>
  <!-- Melted wax drips -->
  <path d="M 950,750 Q 948,780 950,800" stroke="#c8c0a8" stroke-width="4" fill="none" opacity="0.6"/>
  <path d="M 972,740 Q 975,770 970,800" stroke="#c8c0a8" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- Flame -->
  <ellipse cx="960" cy="708" rx="10" ry="16" fill="#f8d060" opacity="0.9"/>
  <ellipse cx="960" cy="704" rx="6"  ry="10" fill="#fff0a0"/>
  <!-- Wax solidified on table (been burning a while) -->
  <ellipse cx="960" cy="800" rx="35" ry="8" fill="#c8bca0" opacity="0.5"/>

  <!-- Broken furniture (to the side) -->
  <!-- Overturned zabuton cushion -->
  <rect x="300"  y="870" width="160" height="60"  fill="#2a2218" rx="4" opacity="0.75" transform="rotate(-10 380 900)"/>
  <!-- Broken wooden shelving on wall -->
  <rect x="1540" y="640" width="200" height="12"  fill="#201810" opacity="0.7" transform="rotate(8 1640 646)"/>
  <rect x="1560" y="680" width="160" height="10"  fill="#181408" opacity="0.6" transform="rotate(5 1640 685)"/>

  <!-- Vignette -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>
</svg>

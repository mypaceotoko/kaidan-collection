<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!--
    Dark school corridor — deep vanishing point, lockers left,
    night windows right, ceiling fixtures above,
    a shadow figure silhouette stands far at the end.
  -->
  <defs>
    <radialGradient id="voidGlow" cx="50%" cy="42%" r="30%">
      <stop offset="0%"   stop-color="#1a1430" stop-opacity="0.8"/>
      <stop offset="60%"  stop-color="#0c0c1e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="floorG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#181820"/>
      <stop offset="100%" stop-color="#0e0e16"/>
    </linearGradient>
    <radialGradient id="fixtureGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7070a0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Night outside windows -->
    <linearGradient id="nightWin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#050520"/>
      <stop offset="50%"  stop-color="#04041c"/>
      <stop offset="100%" stop-color="#030318"/>
    </linearGradient>
  </defs>

  <!-- Base wall color -->
  <rect width="1920" height="1080" fill="#141420"/>

  <!-- FOUR PLANES from vanishing point (960, 432) -->
  <!-- Ceiling -->
  <polygon points="0,0 1920,0 1920,300 960,432 0,300" fill="#0e0e1c"/>
  <!-- Left wall -->
  <polygon points="0,0 0,1080 960,432" fill="#1a1a2a"/>
  <!-- Right wall -->
  <polygon points="1920,0 1920,1080 960,432" fill="#161626"/>
  <!-- Floor -->
  <polygon points="0,1080 1920,1080 1920,680 960,432 0,680" fill="url(#floorG)"/>

  <!-- Void glow at vanishing point (atmosphere) -->
  <ellipse cx="960" cy="432" rx="380" ry="200" fill="url(#voidGlow)"/>

  <!-- Floor perspective lines -->
  <line x1="960" y1="432" x2="0"    y2="1080" stroke="#1e1e2c" stroke-width="2"/>
  <line x1="960" y1="432" x2="480"  y2="1080" stroke="#1c1c2a" stroke-width="1.5"/>
  <line x1="960" y1="432" x2="960"  y2="1080" stroke="#202030" stroke-width="2.5"/>
  <line x1="960" y1="432" x2="1440" y2="1080" stroke="#1c1c2a" stroke-width="1.5"/>
  <line x1="960" y1="432" x2="1920" y2="1080" stroke="#1e1e2c" stroke-width="2"/>
  <line x1="0"   y1="860" x2="1920" y2="860"  stroke="#1a1a28" stroke-width="1.5"/>
  <line x1="0"   y1="700" x2="1920" y2="700"  stroke="#181826" stroke-width="1.2"/>
  <line x1="80"  y1="590" x2="1840" y2="590"  stroke="#161624" stroke-width="1"/>
  <line x1="220" y1="520" x2="1700" y2="520"  stroke="#141422" stroke-width="0.8"/>

  <!-- LEFT: LOCKERS -->
  <!-- Main locker bank 1 (closest, largest) -->
  <rect x="0"   y="100" width="115" height="880" fill="#242438"/>
  <rect x="4"   y="104" width="105" height="872" fill="#1e1e30"/>
  <rect x="4"   y="104" width="105" height="290" fill="#1c1c2e"/>
  <rect x="4"   y="398" width="105" height="290" fill="#1e1e30"/>
  <rect x="4"   y="692" width="105" height="284" fill="#1c1c2e"/>
  <rect x="4"   y="394" width="105" height="6"   fill="#30304c"/>
  <rect x="4"   y="688" width="105" height="6"   fill="#30304c"/>
  <rect x="99"  y="246" width="9"   height="22"  fill="#40405e" rx="2"/>
  <rect x="99"  y="540" width="9"   height="22"  fill="#40405e" rx="2"/>
  <rect x="99"  y="832" width="9"   height="22"  fill="#40405e" rx="2"/>

  <!-- Locker bank 2 -->
  <rect x="119" y="150" width="82"  height="795" fill="#1e1e30"/>
  <rect x="122" y="153" width="76"  height="789" fill="#1a1a2c"/>
  <rect x="122" y="153" width="76"  height="261" fill="#181828"/>
  <rect x="122" y="418" width="76"  height="263" fill="#1a1a2c"/>
  <rect x="122" y="685" width="76"  height="257" fill="#181828"/>
  <rect x="192" y="282" width="6"   height="18"  fill="#343454" rx="1"/>

  <!-- Locker bank 3 (receding) -->
  <rect x="201" y="190" width="62"  height="720" fill="#1c1c2c"/>
  <rect x="204" y="193" width="56"  height="714" fill="#181828"/>
  <rect x="257" y="310" width="5"   height="15"  fill="#2e2e4e" rx="1"/>

  <!-- Locker bank 4 -->
  <rect x="263" y="220" width="50"  height="657" fill="#1a1a2a"/>
  <rect x="266" y="223" width="44"  height="651" fill="#161626"/>

  <!-- Receding wall (lockers fade into distance) -->
  <rect x="313" y="246" width="36"  height="610" fill="#181826"/>
  <rect x="349" y="260" width="28"  height="572" fill="#141422"/>
  <rect x="377" y="272" width="583" height="540" fill="#121220"/>

  <!-- RIGHT WALL: WINDOWS -->
  <!-- Window frame 1 (closest, large) -->
  <rect x="1450" y="80"  width="470" height="680" fill="#101028"/>
  <rect x="1455" y="85"  width="460" height="670" fill="url(#nightWin)"/>
  <!-- Night sky in window (faint moon, silhouette of trees) -->
  <ellipse cx="1830" cy="120" rx="28" ry="28" fill="#20204a"/>
  <ellipse cx="1830" cy="120" rx="22" ry="22" fill="#2a2a58"/>
  <line x1="1480" y1="700" x2="1480" y2="400" stroke="#06061a" stroke-width="8" opacity="0.7"/>
  <line x1="1480" y1="470" x2="1455" y2="420" stroke="#06061a" stroke-width="3" opacity="0.6"/>
  <line x1="1480" y1="430" x2="1510" y2="380" stroke="#06061a" stroke-width="3" opacity="0.6"/>
  <rect x="1450" y="80"  width="10"  height="680" fill="#252535"/>
  <rect x="1910" y="80"  width="10"  height="680" fill="#252535"/>
  <rect x="1450" y="80"  width="470" height="10"  fill="#252535"/>
  <rect x="1450" y="748" width="470" height="10"  fill="#252535"/>
  <!-- Cross bar -->
  <rect x="1450" y="430" width="470" height="6"   fill="#202030"/>
  <rect x="1680" y="80"  width="6"   height="678" fill="#202030"/>
  <!-- Window sill -->
  <rect x="1440" y="755" width="480" height="18"  fill="#282840"/>

  <!-- Window 2 (smaller, further) -->
  <rect x="1270" y="200" width="160" height="370" fill="#101028"/>
  <rect x="1273" y="203" width="154" height="364" fill="url(#nightWin)"/>
  <rect x="1270" y="200" width="5"   height="370" fill="#202030"/>
  <rect x="1425" y="200" width="5"   height="370" fill="#202030"/>
  <rect x="1270" y="200" width="160" height="5"   fill="#202030"/>
  <rect x="1270" y="568" width="160" height="5"   fill="#202030"/>
  <rect x="1270" y="384" width="160" height="4"   fill="#1e1e2e"/>
  <rect x="1350" y="200" width="4"   height="372" fill="#1e1e2e"/>

  <!-- CEILING FIXTURES -->
  <!-- Main fixture (large, near) -->
  <rect x="780"  y="48"  width="360" height="24"  fill="#282840" rx="3"/>
  <rect x="785"  y="51"  width="350" height="15"  fill="#b0b0d0" opacity="0.85"/>
  <ellipse cx="960" cy="72"  rx="380" ry="90"  fill="url(#fixtureGlow)"/>
  <!-- Light wire -->
  <line x1="780"  y1="0"   x2="780"  y2="48"  stroke="#1e1e2e" stroke-width="3"/>
  <line x1="1140" y1="0"   x2="1140" y2="48"  stroke="#1e1e2e" stroke-width="3"/>

  <!-- Second fixture (smaller, receding) -->
  <rect x="860"  y="170" width="200" height="16"  fill="#202038" rx="2"/>
  <rect x="863"  y="173" width="194" height="10"  fill="#8080b0" opacity="0.7"/>
  <ellipse cx="960" cy="186" rx="220" ry="50"  fill="url(#fixtureGlow)"/>
  <line x1="860"  y1="100" x2="860"  y2="170" stroke="#1a1a28" stroke-width="2"/>
  <line x1="1060" y1="100" x2="1060" y2="170" stroke="#1a1a28" stroke-width="2"/>

  <!-- Third fixture (far, small) -->
  <rect x="900"  y="256" width="120" height="10"  fill="#1c1c30" rx="1"/>
  <rect x="902"  y="258" width="116" height="6"   fill="#606088" opacity="0.6"/>

  <!-- Light pool on floor (from near fixture) -->
  <ellipse cx="960" cy="900" rx="320" ry="60"  fill="#201e40" opacity="0.3"/>

  <!-- SHADOW FIGURE at vanishing point -->
  <!-- Standing still at the very end of the corridor -->
  <ellipse cx="960" cy="388" rx="16" ry="18" fill="#0a0818"/>
  <rect    x="952" y="405" width="16" height="55" fill="#0a0818"/>
  <rect    x="942" y="412" width="12" height="32" fill="#0a0818"/>
  <rect    x="968" y="412" width="12" height="32" fill="#0a0818"/>
  <rect    x="952" y="460" width="8"  height="38" fill="#0a0818"/>
  <rect    x="964" y="460" width="8"  height="38" fill="#0a0818"/>

  <!-- Overall atmosphere vignette -->
  <rect width="1920" height="1080" fill="#00000a" opacity="0.2"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#030508"/>
      <stop offset="40%"  stop-color="#060810"/>
      <stop offset="80%"  stop-color="#080c16"/>
      <stop offset="100%" stop-color="#0a0e18"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0c0a08"/>
      <stop offset="100%" stop-color="#080806"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="70%" cy="18%" r="22%">
      <stop offset="0%"   stop-color="#b8b090" stop-opacity="0.9"/>
      <stop offset="30%"  stop-color="#909068" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#909068" stop-opacity="0"/>
    </radialGradient>
    <!-- The one lit window — the horror element -->
    <radialGradient id="windowLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#d0b040" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#a07818" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a07818" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="20%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.75"/>
    </radialGradient>
  </defs>

  <!-- Night sky -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#nightSky)"/>

  <!-- Moon glow -->
  <rect x="0" y="0" width="1920" height="700" fill="url(#moonGlow)"/>
  <!-- Moon disc (partially behind cloud) -->
  <ellipse cx="1344" cy="148" rx="44" ry="42" fill="#c8c0a0"/>
  <ellipse cx="1344" cy="148" rx="32" ry="30" fill="#d8d0b0"/>
  <!-- Cloud obscuring part of moon -->
  <ellipse cx="1380" cy="138" rx="100" ry="30" fill="#1a1c28" opacity="0.85"/>
  <ellipse cx="1420" cy="145" rx="80"  ry="22" fill="#1c1e2a" opacity="0.8"/>

  <!-- Stars -->
  <circle cx="200"  cy="80"  r="1.5" fill="#a0a888" opacity="0.7"/>
  <circle cx="380"  cy="55"  r="1"   fill="#a0a888" opacity="0.6"/>
  <circle cx="520"  cy="100" r="1.5" fill="#b0b098" opacity="0.65"/>
  <circle cx="700"  cy="40"  r="1"   fill="#a0a888" opacity="0.6"/>
  <circle cx="820"  cy="90"  r="2"   fill="#b0b098" opacity="0.5"/>
  <circle cx="1050" cy="60"  r="1.5" fill="#a0a888" opacity="0.6"/>
  <circle cx="1550" cy="75"  r="1"   fill="#a0a888" opacity="0.65"/>
  <circle cx="1680" cy="45"  r="1.5" fill="#b0b098" opacity="0.55"/>
  <circle cx="1780" cy="100" r="1"   fill="#a0a888" opacity="0.6"/>
  <circle cx="150"  cy="200" r="1"   fill="#909080" opacity="0.5"/>
  <circle cx="600"  cy="170" r="1"   fill="#909080" opacity="0.5"/>

  <!-- Tree silhouettes (left and right) -->
  <!-- Far left trees -->
  <rect x="0"   y="340" width="28" height="480" fill="#060808"/>
  <ellipse cx="14"  cy="330" rx="55" ry="70" fill="#060808"/>
  <ellipse cx="14"  cy="290" rx="38" ry="55" fill="#060808"/>
  <rect x="55"  y="380" width="22" height="440" fill="#060808"/>
  <ellipse cx="66"  cy="370" rx="42" ry="58" fill="#070909"/>
  <ellipse cx="66"  cy="338" rx="28" ry="42" fill="#070909"/>
  <rect x="108" y="420" width="18" height="400" fill="#060808"/>
  <ellipse cx="117" cy="412" rx="36" ry="52" fill="#060808"/>
  <!-- Far right trees -->
  <rect x="1874" y="360" width="28" height="460" fill="#060808"/>
  <ellipse cx="1888" cy="350" rx="55" ry="70" fill="#060808"/>
  <ellipse cx="1888" cy="310" rx="38" ry="55" fill="#060808"/>
  <rect x="1790" y="400" width="22" height="420" fill="#070909"/>
  <ellipse cx="1801" cy="390" rx="42" ry="58" fill="#070909"/>
  <ellipse cx="1801" cy="358" rx="28" ry="42" fill="#070909"/>
  <!-- Background trees (center-ish) -->
  <rect x="220"  y="460" width="14" height="360" fill="#070909"/>
  <ellipse cx="227" cy="452" rx="28" ry="44" fill="#070909"/>
  <rect x="1650" y="440" width="14" height="380" fill="#070909"/>
  <ellipse cx="1657" cy="432" rx="28" ry="44" fill="#070909"/>

  <!-- Fence / gate (rusted, overgrown) -->
  <!-- Horizontal rails -->
  <rect x="140" y="820" width="760" height="8"  fill="#282010" rx="2"/>
  <rect x="140" y="870" width="760" height="6"  fill="#201c0e" rx="2"/>
  <rect x="140" y="912" width="760" height="6"  fill="#201c0e" rx="2"/>
  <!-- Vertical fence posts -->
  <rect x="140" y="810" width="10" height="115" fill="#2c2412"/>
  <rect x="200" y="815" width="8"  height="110" fill="#282010"/>
  <rect x="258" y="812" width="8"  height="113" fill="#282010"/>
  <rect x="316" y="818" width="8"  height="107" fill="#282010"/>
  <rect x="374" y="814" width="8"  height="111" fill="#282010"/>
  <rect x="432" y="816" width="8"  height="109" fill="#282010"/>
  <rect x="490" y="813" width="8"  height="112" fill="#282010"/>
  <rect x="548" y="819" width="8"  height="106" fill="#282010"/>
  <rect x="606" y="815" width="8"  height="110" fill="#282010"/>
  <rect x="664" y="812" width="8"  height="113" fill="#282010"/>
  <rect x="722" y="817" width="8"  height="108" fill="#282010"/>
  <rect x="780" y="814" width="8"  height="111" fill="#282010"/>
  <rect x="838" y="813" width="8"  height="112" fill="#282010"/>
  <rect x="890" y="818" width="10" height="107" fill="#2c2412"/>
  <!-- Gate posts -->
  <rect x="436" y="778" width="16" height="147" fill="#302818" rx="2"/>
  <rect x="546" y="778" width="16" height="147" fill="#302818" rx="2"/>
  <!-- Gate top ornament -->
  <ellipse cx="444" cy="778" rx="10" ry="10" fill="#2a2212"/>
  <ellipse cx="554" cy="778" rx="10" ry="10" fill="#2a2212"/>
  <!-- Gate cross bars -->
  <rect x="436" y="800" width="126" height="7" fill="#282010" rx="2" opacity="0.8"/>
  <rect x="436" y="830" width="126" height="6" fill="#282010" rx="2" opacity="0.75"/>

  <!-- Right side fence continues -->
  <rect x="1030" y="820" width="760" height="8"  fill="#282010" rx="2"/>
  <rect x="1030" y="870" width="760" height="6"  fill="#201c0e" rx="2"/>
  <rect x="1030" y="912" width="760" height="6"  fill="#201c0e" rx="2"/>
  <rect x="1030" y="810" width="10" height="115" fill="#2c2412"/>
  <rect x="1090" y="815" width="8"  height="110" fill="#282010"/>
  <rect x="1150" y="812" width="8"  height="113" fill="#282010"/>
  <rect x="1210" y="818" width="8"  height="107" fill="#282010"/>
  <rect x="1270" y="814" width="8"  height="111" fill="#282010"/>
  <rect x="1330" y="816" width="8"  height="109" fill="#282010"/>
  <rect x="1390" y="813" width="8"  height="112" fill="#282010"/>
  <rect x="1450" y="819" width="8"  height="106" fill="#282010"/>
  <rect x="1510" y="815" width="8"  height="110" fill="#282010"/>
  <rect x="1570" y="812" width="8"  height="113" fill="#282010"/>
  <rect x="1630" y="817" width="8"  height="108" fill="#282010"/>
  <rect x="1690" y="813" width="8"  height="112" fill="#282010"/>
  <rect x="1780" y="810" width="10" height="115" fill="#2c2412"/>

  <!-- Ground / yard (dark, overgrown) -->
  <rect x="0" y="920" width="1920" height="160" fill="url(#groundGrad)"/>
  <!-- Overgrown vegetation on ground -->
  <ellipse cx="300"  cy="928" rx="120" ry="28" fill="#0a0e08" opacity="0.9"/>
  <ellipse cx="600"  cy="922" rx="100" ry="22" fill="#080c06" opacity="0.85"/>
  <ellipse cx="1400" cy="926" rx="110" ry="26" fill="#0a0e08" opacity="0.9"/>
  <ellipse cx="1700" cy="920" rx="90"  ry="20" fill="#080c06" opacity="0.85"/>

  <!-- ─── HOUSE SILHOUETTE ─── -->
  <!-- Main body of house -->
  <rect x="380" y="460" width="1160" height="480" fill="#0a0808"/>
  <!-- Roof (gabled) -->
  <polygon points="340,460 960,240 1580,460" fill="#0c0a08"/>
  <!-- Roof ridge detail -->
  <polygon points="340,462 960,242 1580,462 1580,460 960,240 340,460" fill="#0e0c0a"/>
  <!-- Chimney -->
  <rect x="1080" y="240" width="60" height="120" fill="#0c0a08"/>
  <rect x="1072" y="236" width="76" height="12"  fill="#0e0c0a"/>

  <!-- Windows (all dark, one glowing) -->
  <!-- Left upper window -->
  <rect x="440" y="510" width="140" height="120" fill="#0e0c0a" rx="2"/>
  <rect x="448" y="518" width="124" height="104" fill="#0a0808" rx="1"/>
  <line x1="510" y1="518" x2="510" y2="622" stroke="#0e0c0a" stroke-width="4"/>
  <line x1="448" y1="570" x2="572" y2="570" stroke="#0e0c0a" stroke-width="4"/>
  <!-- Left lower window -->
  <rect x="440" y="680" width="160" height="140" fill="#0e0c0a" rx="2"/>
  <rect x="448" y="688" width="144" height="124" fill="#0a0808" rx="1"/>
  <line x1="520" y1="688" x2="520" y2="812" stroke="#0e0c0a" stroke-width="4"/>
  <line x1="448" y1="750" x2="592" y2="750" stroke="#0e0c0a" stroke-width="4"/>
  <!-- Center left window (THE LIT ONE — horror element) -->
  <rect x="680" y="500" width="180" height="160" fill="#382a08" rx="2"/>
  <rect x="690" y="510" width="160" height="140" fill="url(#windowLight)" rx="1"/>
  <line x1="770" y1="510" x2="770" y2="650" stroke="#302408" stroke-width="4"/>
  <line x1="690" y1="580" x2="850" y2="580" stroke="#302408" stroke-width="4"/>
  <!-- Glow spill from lit window -->
  <ellipse cx="770" cy="600" rx="120" ry="80" fill="#c0a030" opacity="0.08"/>
  <!-- Center right window -->
  <rect x="1060" y="500" width="180" height="160" fill="#0e0c0a" rx="2"/>
  <rect x="1070" y="510" width="160" height="140" fill="#0a0808" rx="1"/>
  <line x1="1150" y1="510" x2="1150" y2="650" stroke="#0e0c0a" stroke-width="4"/>
  <line x1="1070" y1="580" x2="1230" y2="580" stroke="#0e0c0a" stroke-width="4"/>
  <!-- Right upper window -->
  <rect x="1340" y="510" width="140" height="120" fill="#0e0c0a" rx="2"/>
  <rect x="1348" y="518" width="124" height="104" fill="#0a0808" rx="1"/>
  <line x1="1410" y1="518" x2="1410" y2="622" stroke="#0e0c0a" stroke-width="4"/>
  <line x1="1348" y1="570" x2="1472" y2="570" stroke="#0e0c0a" stroke-width="4"/>
  <!-- Right lower window -->
  <rect x="1320" y="680" width="160" height="140" fill="#0e0c0a" rx="2"/>
  <rect x="1328" y="688" width="144" height="124" fill="#0a0808" rx="1"/>
  <line x1="1400" y1="688" x2="1400" y2="812" stroke="#0e0c0a" stroke-width="4"/>
  <line x1="1328" y1="750" x2="1472" y2="750" stroke="#0e0c0a" stroke-width="4"/>

  <!-- Front door / genkan area -->
  <rect x="840" y="770" width="240" height="170" fill="#0e0c0a" rx="2"/>
  <rect x="852" y="778" width="216" height="162" fill="#0c0a08" rx="1"/>
  <!-- Door frame light — the lit entrance (main horror element) -->
  <rect x="864" y="790" width="90"  height="150" fill="#2a1e06" rx="1"/>
  <rect x="966" y="790" width="90"  height="150" fill="#0c0a08" rx="1"/>
  <!-- Faint warm glow from entrance -->
  <ellipse cx="915" cy="920" rx="80" ry="30" fill="#c09020" opacity="0.12"/>

  <!-- Vignette -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>
</svg>

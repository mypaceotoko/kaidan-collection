<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4a7ac8"/>
      <stop offset="100%" stop-color="#7aacd8"/>
    </linearGradient>
    <linearGradient id="deepSea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a4888"/>
      <stop offset="100%" stop-color="#2460a0"/>
    </linearGradient>
    <linearGradient id="shallowSea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a78b8"/>
      <stop offset="100%" stop-color="#4080b0"/>
    </linearGradient>
    <linearGradient id="wetSand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9a8050"/>
      <stop offset="100%" stop-color="#b89840"/>
    </linearGradient>
    <linearGradient id="drySand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c8a850"/>
      <stop offset="100%" stop-color="#b08838"/>
    </linearGradient>
    <radialGradient id="waterLight" cx="55%" cy="55%" r="60%">
      <stop offset="0%"   stop-color="#80c0e0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#80c0e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="30%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="1920" height="280" fill="url(#skyGrad)"/>
  <!-- Horizon glow -->
  <rect x="0" y="260" width="1920" height="30" fill="#90c4e0" opacity="0.5"/>

  <!-- Cloud -->
  <ellipse cx="500"  cy="120" rx="140" ry="36" fill="#d8ecf8" opacity="0.8"/>
  <ellipse cx="420"  cy="130" rx="80"  ry="26" fill="#e0f0f8" opacity="0.65"/>
  <ellipse cx="1300" cy="90"  rx="120" ry="30" fill="#d8ecf8" opacity="0.75"/>

  <!-- Deep ocean band -->
  <rect x="0" y="278" width="1920" height="160" fill="url(#deepSea)"/>
  <!-- Ocean shimmer highlights -->
  <ellipse cx="300"  cy="320" rx="200" ry="7"  fill="#5898c8" opacity="0.4"/>
  <ellipse cx="900"  cy="340" rx="240" ry="6"  fill="#4888b8" opacity="0.35"/>
  <ellipse cx="1600" cy="310" rx="180" ry="6"  fill="#5898c8" opacity="0.4"/>

  <!-- Shallow water (transparent, brighter) -->
  <rect x="0" y="438" width="1920" height="180" fill="url(#shallowSea)"/>
  <rect x="0" y="438" width="1920" height="180" fill="url(#waterLight)"/>
  <!-- Bottom visible through shallow water -->
  <ellipse cx="400"  cy="500" rx="180" ry="20" fill="#c8a040" opacity="0.18"/>
  <ellipse cx="960"  cy="490" rx="200" ry="18" fill="#c8a040" opacity="0.15"/>
  <ellipse cx="1550" cy="505" rx="160" ry="18" fill="#c8a040" opacity="0.18"/>

  <!-- Wave break line -->
  <ellipse cx="960"  cy="435" rx="960" ry="12" fill="#d0eaf8" opacity="0.6"/>
  <ellipse cx="400"  cy="438" rx="280" ry="8"  fill="#e0f2fa" opacity="0.55"/>
  <ellipse cx="1400" cy="440" rx="250" ry="7"  fill="#e0f2fa" opacity="0.5"/>
  <!-- Foam -->
  <ellipse cx="700"  cy="434" rx="140" ry="5"  fill="#f0f8ff" opacity="0.7"/>
  <ellipse cx="1200" cy="437" rx="120" ry="4"  fill="#f0f8ff" opacity="0.65"/>
  <ellipse cx="200"  cy="436" rx="100" ry="4"  fill="#f0f8ff" opacity="0.6"/>

  <!-- Wet sand -->
  <rect x="0" y="618" width="1920" height="180" fill="url(#wetSand)"/>
  <!-- Water reflections on wet sand -->
  <ellipse cx="500"  cy="660" rx="280" ry="16" fill="#6090b8" opacity="0.2"/>
  <ellipse cx="1300" cy="680" rx="240" ry="14" fill="#6090b8" opacity="0.18"/>
  <ellipse cx="900"  cy="700" rx="300" ry="12" fill="#6090b8" opacity="0.15"/>

  <!-- Dry sand foreground -->
  <rect x="0" y="798" width="1920" height="282" fill="url(#drySand)"/>
  <!-- Sand ripples -->
  <ellipse cx="400"  cy="840" rx="300" ry="7" fill="#c09030" opacity="0.22"/>
  <ellipse cx="1200" cy="860" rx="280" ry="6" fill="#c09030" opacity="0.18"/>
  <ellipse cx="800"  cy="900" rx="340" ry="6" fill="#a87828" opacity="0.18"/>

  <!-- Footprints in wet sand -->
  <ellipse cx="720" cy="660" rx="11" ry="16" fill="#9a7840" opacity="0.5"/>
  <ellipse cx="740" cy="688" rx="11" ry="16" fill="#9a7840" opacity="0.5"/>
  <ellipse cx="756" cy="716" rx="11" ry="16" fill="#9a7840" opacity="0.45"/>
  <ellipse cx="772" cy="744" rx="11" ry="16" fill="#9a7840" opacity="0.4"/>

  <!-- Small wave on foreground sand -->
  <ellipse cx="960" cy="800" rx="960" ry="9" fill="#c0dce8" opacity="0.3"/>

  <!-- Vignette -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>
</svg>

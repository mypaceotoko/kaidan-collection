<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="roomGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#060708"/>
      <stop offset="100%" stop-color="#040506"/>
    </linearGradient>
    <!-- Monitor screen glow: cold, wrong blue-grey -->
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#1c2838" stop-opacity="0.7"/>
      <stop offset="60%"  stop-color="#121c28" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a1018" stop-opacity="0"/>
    </radialGradient>
    <!-- The figure's own glow (slightly wrong colour — too blue) -->
    <radialGradient id="figureGlow" cx="50%" cy="48%" r="20%">
      <stop offset="0%"   stop-color="#303858" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#303858" stop-opacity="0"/>
    </radialGradient>
    <!-- Static noise fill (simulated) -->
    <linearGradient id="staticGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#18202a"/>
      <stop offset="8%"   stop-color="#10181e"/>
      <stop offset="16%"  stop-color="#1a2230"/>
      <stop offset="24%"  stop-color="#0e161c"/>
      <stop offset="32%"  stop-color="#1c2430"/>
      <stop offset="40%"  stop-color="#101820"/>
      <stop offset="48%"  stop-color="#182028"/>
      <stop offset="56%"  stop-color="#0c1418"/>
      <stop offset="64%"  stop-color="#1a2230"/>
      <stop offset="72%"  stop-color="#10181e"/>
      <stop offset="80%"  stop-color="#182028"/>
      <stop offset="88%"  stop-color="#0e1620"/>
      <stop offset="100%" stop-color="#14202c"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="20%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.95"/>
    </radialGradient>
  </defs>

  <!-- Extreme darkness background -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#roomGrad)"/>

  <!-- Monitor screen glow leaking into dark room -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#screenGlow)"/>

  <!-- MONITOR BEZEL (large, close-up, center of frame) -->
  <!-- Monitor outer casing -->
  <rect x="320" y="60" width="1280" height="900" fill="#0a0c10" rx="8"/>
  <!-- Bezel front face -->
  <rect x="330" y="68" width="1260" height="880" fill="#0c0e12" rx="6"/>
  <!-- Screen inset -->
  <rect x="360" y="96" width="1200" height="820" fill="#0e1218" rx="3"/>

  <!-- SCREEN SURFACE: static/noise pattern -->
  <rect x="368" y="104" width="1184" height="804" fill="url(#staticGrad)" rx="2"/>

  <!-- Static "scanlines" on screen -->
  <line x1="368" y1="120" x2="1552" y2="120" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="144" x2="1552" y2="144" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="168" x2="1552" y2="168" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="192" x2="1552" y2="192" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="216" x2="1552" y2="216" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="240" x2="1552" y2="240" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="264" x2="1552" y2="264" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="288" x2="1552" y2="288" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="312" x2="1552" y2="312" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="336" x2="1552" y2="336" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="360" x2="1552" y2="360" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="384" x2="1552" y2="384" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="408" x2="1552" y2="408" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="432" x2="1552" y2="432" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="456" x2="1552" y2="456" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="480" x2="1552" y2="480" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="504" x2="1552" y2="504" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="528" x2="1552" y2="528" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="552" x2="1552" y2="552" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="576" x2="1552" y2="576" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="600" x2="1552" y2="600" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="624" x2="1552" y2="624" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="648" x2="1552" y2="648" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="672" x2="1552" y2="672" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="696" x2="1552" y2="696" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="720" x2="1552" y2="720" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="744" x2="1552" y2="744" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="768" x2="1552" y2="768" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="792" x2="1552" y2="792" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="816" x2="1552" y2="816" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="840" x2="1552" y2="840" stroke="#20283a" stroke-width="2" opacity="0.3"/>
  <line x1="368" y1="864" x2="1552" y2="864" stroke="#1c2030" stroke-width="2" opacity="0.25"/>
  <line x1="368" y1="888" x2="1552" y2="888" stroke="#20283a" stroke-width="2" opacity="0.3"/>

  <!-- GLITCH BAND (horizontal distortion across screen) -->
  <rect x="368" y="430" width="1184" height="36" fill="#182030" opacity="0.5"/>
  <rect x="368" y="430" width="1184" height="36" fill="#28384a" opacity="0.2"/>
  <!-- Glitch colour shift in band -->
  <rect x="440" y="434" width="300" height="8" fill="#1e3050" opacity="0.4"/>
  <rect x="900" y="444" width="200" height="6" fill="#102040" opacity="0.35"/>

  <!-- THE FIGURE in the monitor — wrong, too clear, too close -->
  <!-- Figure glow -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#figureGlow)"/>
  <!-- Figure body (center screen, standing, facing directly forward) -->
  <rect x="904"  y="320" width="112" height="380" fill="#2a3248" opacity="0.75"/>
  <!-- Figure head -->
  <ellipse cx="960" cy="302" rx="58" ry="60" fill="#283040" opacity="0.78"/>
  <!-- Face detail (featureless, wrong) -->
  <!-- Eye sockets (just dark areas) -->
  <ellipse cx="938" cy="295" rx="10" ry="10" fill="#161c28" opacity="0.7"/>
  <ellipse cx="982" cy="295" rx="10" ry="10" fill="#161c28" opacity="0.7"/>
  <!-- Mouth (wrong — slight smile, too wide) -->
  <path d="M 930,318 Q 960,328 990,318" stroke="#161c28" stroke-width="4" fill="none" opacity="0.6"/>
  <!-- Figure arms (held slightly out from body — beckoning?) -->
  <!-- Left arm -->
  <rect x="820"  y="360" width="88"  height="22" fill="#283040" opacity="0.68" transform="rotate(15 864 371)"/>
  <!-- Right arm -->
  <rect x="1012" y="360" width="88"  height="22" fill="#283040" opacity="0.68" transform="rotate(-15 1056 371)"/>
  <!-- Figure legs -->
  <rect x="910"  y="696" width="44"  height="120" fill="#283040" opacity="0.65"/>
  <rect x="966"  y="696" width="44"  height="120" fill="#283040" opacity="0.65"/>

  <!-- Static overlay on top of figure (figure partially in static) -->
  <rect x="850" y="104" width="220" height="180" fill="#182030" opacity="0.2"/>
  <rect x="850" y="500" width="220" height="120" fill="#182030" opacity="0.15"/>

  <!-- TIMESTAMP / camera overlay text -->
  <rect x="376" y="848" width="200" height="20" fill="#0a1018" opacity="0.8"/>
  <rect x="382" y="851" width="180" height="14" fill="#162030" opacity="0.6"/>
  <!-- Camera ID text bar (top right) -->
  <rect x="1360" y="112" width="180" height="18" fill="#0a1018" opacity="0.8"/>
  <rect x="1366" y="115" width="160" height="12" fill="#162030" opacity="0.6"/>

  <!-- Power LED on monitor bezel (red — recording) -->
  <ellipse cx="956" cy="948" rx="6" ry="6" fill="#c03030" opacity="0.6"/>
  <ellipse cx="956" cy="948" rx="12" ry="8" fill="#c03030" opacity="0.1"/>

  <!-- Monitor stand base -->
  <rect x="760"  y="960" width="400" height="20" fill="#0c0e12" rx="4"/>
  <rect x="840"  y="958" width="240" height="6"  fill="#0e1016" rx="2"/>

  <!-- Vignette (extreme) -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>
</svg>

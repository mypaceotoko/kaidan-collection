<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="deepGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#081428"/>
      <stop offset="35%"  stop-color="#060e20"/>
      <stop offset="70%"  stop-color="#040810"/>
      <stop offset="100%" stop-color="#020408"/>
    </linearGradient>
    <!-- Light from far above surface -->
    <radialGradient id="surfaceLight" cx="50%" cy="2%" r="55%">
      <stop offset="0%"   stop-color="#2a4880" stop-opacity="0.6"/>
      <stop offset="40%"  stop-color="#1a3060" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1a3060" stop-opacity="0"/>
    </radialGradient>
    <!-- Faint light rays from surface (god rays) -->
    <linearGradient id="ray1" x1="0.4" y1="0" x2="0.55" y2="1">
      <stop offset="0%"   stop-color="#304878" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#304878" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray2" x1="0.55" y1="0" x2="0.45" y2="1">
      <stop offset="0%"   stop-color="#304878" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#304878" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="20%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8"/>
    </radialGradient>
  </defs>

  <!-- Deep ocean darkness -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#deepGrad)"/>

  <!-- Surface light from above -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#surfaceLight)"/>

  <!-- God rays (faint shafts of light from surface) -->
  <polygon points="700,0 860,0 1080,1080 880,1080" fill="url(#ray1)"/>
  <polygon points="1000,0 1120,0 960,1080 840,1080" fill="url(#ray2)"/>

  <!-- Water particles / sediment -->
  <ellipse cx="300"  cy="200" rx="3"  ry="5"  fill="#3a5888" opacity="0.3"/>
  <ellipse cx="580"  cy="150" rx="2"  ry="4"  fill="#3a5888" opacity="0.25"/>
  <ellipse cx="1200" cy="180" rx="3"  ry="5"  fill="#3a5888" opacity="0.3"/>
  <ellipse cx="1600" cy="130" rx="2"  ry="4"  fill="#3a5888" opacity="0.25"/>
  <ellipse cx="800"  cy="280" rx="2"  ry="3"  fill="#2a4070" opacity="0.2"/>
  <ellipse cx="1400" cy="260" rx="2"  ry="3"  fill="#2a4070" opacity="0.2"/>
  <ellipse cx="450"  cy="400" rx="2"  ry="3"  fill="#1e3060" opacity="0.18"/>
  <ellipse cx="1550" cy="380" rx="2"  ry="3"  fill="#1e3060" opacity="0.18"/>

  <!-- Bubble trails -->
  <ellipse cx="920"  cy="120" rx="5"  ry="6"  fill="#2a4878" opacity="0.4"/>
  <ellipse cx="930"  cy="160" rx="4"  ry="5"  fill="#2a4878" opacity="0.35"/>
  <ellipse cx="915"  cy="200" rx="3"  ry="4"  fill="#2a4878" opacity="0.3"/>
  <ellipse cx="925"  cy="240" rx="4"  ry="5"  fill="#2a4878" opacity="0.28"/>
  <ellipse cx="912"  cy="285" rx="3"  ry="4"  fill="#2a4878" opacity="0.22"/>

  <!-- THE FIGURE — standing on the ocean floor, deep -->
  <!-- Body silhouette -->
  <ellipse cx="960" cy="680" rx="30" ry="36" fill="#0c0e14" opacity="0.7"/>
  <!-- Neck -->
  <rect x="952" y="714" width="16" height="28" fill="#0c0e14" opacity="0.65"/>
  <!-- Shoulders / torso -->
  <rect x="912" y="740" width="96" height="110" fill="#0a0c12" opacity="0.6"/>
  <!-- Arms -->
  <rect x="888" y="748" width="28" height="85" fill="#0a0c12" opacity="0.5" rx="4"/>
  <rect x="1004" y="748" width="28" height="85" fill="#0a0c12" opacity="0.5" rx="4"/>
  <!-- Legs -->
  <rect x="924" y="848" width="32" height="140" fill="#0a0c12" opacity="0.55" rx="3"/>
  <rect x="964" y="848" width="32" height="140" fill="#0a0c12" opacity="0.55" rx="3"/>

  <!-- Eyes of the figure (barely visible, slightly lighter) -->
  <ellipse cx="950" cy="678" rx="6"  ry="7"  fill="#1a1e28" opacity="0.55"/>
  <ellipse cx="970" cy="678" rx="6"  ry="7"  fill="#1a1e28" opacity="0.55"/>

  <!-- Murky water distortion around figure -->
  <ellipse cx="960" cy="850" rx="90" ry="18" fill="#080c18" opacity="0.4"/>
  <ellipse cx="960" cy="750" rx="70" ry="12" fill="#080c18" opacity="0.25"/>

  <!-- Vignette — heavy at edges -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>
</svg>

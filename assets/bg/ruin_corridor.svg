<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="wallL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1e1a14"/>
      <stop offset="100%" stop-color="#181410"/>
    </linearGradient>
    <linearGradient id="wallR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#181410"/>
      <stop offset="100%" stop-color="#1e1a14"/>
    </linearGradient>
    <linearGradient id="ceilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0c0a08"/>
      <stop offset="100%" stop-color="#141008"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#181410"/>
      <stop offset="100%" stop-color="#100c08"/>
    </linearGradient>
    <!-- Far end: door with light leaking from it -->
    <radialGradient id="doorGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%"   stop-color="#b08020" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#806010" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#806010" stop-opacity="0"/>
    </radialGradient>
    <!-- Moonlight from side window -->
    <linearGradient id="moonRay" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#9090b0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9090b0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="20%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.8"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect x="0" y="0" width="1920" height="1080" fill="#0e0c08"/>

  <!-- Ceiling (perspective) -->
  <polygon points="0,0 1920,0 1560,220 360,220" fill="url(#ceilGrad)"/>
  <line x1="360" y1="220" x2="1560" y2="220" stroke="#0a0806" stroke-width="3"/>

  <!-- Left wall -->
  <polygon points="0,0 360,220 360,820 0,1080" fill="url(#wallL)"/>
  <!-- Left wall wallpaper lines -->
  <line x1="0" y1="300"  x2="360" y2="260" stroke="#181408" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="500"  x2="360" y2="440" stroke="#181408" stroke-width="2" opacity="0.45"/>
  <line x1="0" y1="700"  x2="360" y2="620" stroke="#161206" stroke-width="2" opacity="0.4"/>
  <!-- Left baseboard -->
  <polygon points="0,1080 360,820 360,840 0,1080" fill="#201a10"/>

  <!-- Right wall -->
  <polygon points="1920,0 1560,220 1560,820 1920,1080" fill="url(#wallR)"/>
  <!-- Right baseboard -->
  <polygon points="1920,1080 1560,820 1560,840 1920,1080" fill="#201a10"/>

  <!-- Far wall (vanishing point) -->
  <polygon points="360,220 1560,220 1560,820 360,820" fill="#100e0c"/>
  <!-- Far baseboard -->
  <rect x="360" y="808" width="1200" height="14" fill="#1e1810"/>

  <!-- Floor (perspective) -->
  <polygon points="0,1080 1920,1080 1560,820 360,820" fill="url(#floorGrad)"/>
  <!-- Floor perspective lines -->
  <line x1="960" y1="500" x2="0"    y2="1080" stroke="#141008" stroke-width="2"/>
  <line x1="960" y1="500" x2="480"  y2="1080" stroke="#121006" stroke-width="1.5"/>
  <line x1="960" y1="500" x2="960"  y2="1080" stroke="#161208" stroke-width="2"/>
  <line x1="960" y1="500" x2="1440" y2="1080" stroke="#121006" stroke-width="1.5"/>
  <line x1="960" y1="500" x2="1920" y2="1080" stroke="#141008" stroke-width="2"/>
  <!-- Horizontal floor planks -->
  <line x1="280" y1="920" x2="1640" y2="920" stroke="#120e06" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="860" x2="1520" y2="860" stroke="#100c06" stroke-width="1.5" opacity="0.45"/>

  <!-- Moonlight shaft from left-side broken window -->
  <polygon points="0,300 200,300 360,440 360,500 200,380 0,400" fill="url(#moonRay)"/>
  <!-- Window shape (left wall) -->
  <rect x="0"   y="300" width="180" height="130" fill="#181c24" opacity="0.7"/>
  <rect x="0"   y="308" width="170" height="114" fill="#1c2028" opacity="0.65"/>
  <!-- Broken pane — missing top-right corner -->
  <polygon points="90,308 170,308 170,340" fill="#0e1018" opacity="0.9"/>
  <!-- Moonlight rectangle on floor -->
  <polygon points="0,400 200,380 360,500 360,540 200,460 0,480" fill="#9090b0" opacity="0.06"/>

  <!-- Far door (light leaking) -->
  <rect x="780" y="236" width="400" height="580" fill="#141008"/>
  <rect x="794" y="248" width="372" height="568" fill="#100e06"/>
  <!-- Door frame glow (warm light seeping from crack) -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#doorGlow)"/>
  <!-- Door center crack (light sliver) -->
  <rect x="978" y="248" width="6"   height="568" fill="#b08020" opacity="0.4"/>
  <!-- Door handle -->
  <ellipse cx="948" cy="540" rx="16" ry="10" fill="#2a2018"/>
  <rect x="932" y="537" width="38" height="7" fill="#2a2018" rx="3"/>

  <!-- ─── PHOTOS ON LEFT WALL ─── -->
  <!-- Photo 1 -->
  <rect x="24"  y="340" width="80"  height="100" fill="#1e1810" rx="1"/>
  <rect x="30"  y="346" width="68"  height="88"  fill="#161208" rx="1"/>
  <ellipse cx="64"  cy="378" rx="18" ry="22" fill="#262018"/>
  <!-- Photo 2 -->
  <rect x="130" y="360" width="72"  height="90"  fill="#1e1810" rx="1"/>
  <rect x="136" y="366" width="60"  height="78"  fill="#161208" rx="1"/>
  <ellipse cx="166" cy="398" rx="16" ry="20" fill="#262018"/>
  <!-- Photo 3 (different — child's drawing style) -->
  <rect x="30"  y="480" width="100" height="70"  fill="#1e1810" rx="1"/>
  <rect x="36"  y="486" width="88"  height="58"  fill="#161208" rx="1"/>
  <!-- Three faces in one photo -->
  <ellipse cx="68"  cy="514" rx="12" ry="14" fill="#262018"/>
  <ellipse cx="96"  cy="512" rx="12" ry="14" fill="#262018"/>
  <ellipse cx="112" cy="516" rx="10" ry="12" fill="#262018"/>

  <!-- ─── PHOTOS ON RIGHT WALL ─── -->
  <rect x="1760" y="350" width="80" height="100" fill="#1e1810" rx="1"/>
  <rect x="1766" y="356" width="68" height="88"  fill="#161208" rx="1"/>
  <ellipse cx="1800" cy="388" rx="18" ry="22" fill="#262018"/>
  <rect x="1656" y="370" width="72" height="90"  fill="#1e1810" rx="1"/>
  <rect x="1662" y="376" width="60" height="78"  fill="#161208" rx="1"/>
  <ellipse cx="1692" cy="408" rx="16" ry="20" fill="#262018"/>

  <!-- Debris on floor -->
  <rect x="320"  y="830" width="60" height="10" fill="#181210" rx="2" opacity="0.7"/>
  <rect x="500"  y="850" width="40" height="8"  fill="#141008" rx="2" opacity="0.65"/>
  <ellipse cx="1400" cy="838" rx="30" ry="8"    fill="#181210" opacity="0.65"/>
  <rect x="1500" y="844" width="50" height="7"  fill="#141008" rx="2" opacity="0.6"/>

  <!-- Vignette -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>
</svg>

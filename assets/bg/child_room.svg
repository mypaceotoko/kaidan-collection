<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1830"/>
      <stop offset="100%" stop-color="#1e1c34"/>
    </linearGradient>
    <linearGradient id="ceilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e0e1c"/>
      <stop offset="100%" stop-color="#141228"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252020"/>
      <stop offset="100%" stop-color="#1c1818"/>
    </linearGradient>
    <linearGradient id="plankA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#282220"/>
      <stop offset="100%" stop-color="#221c1a"/>
    </linearGradient>
    <linearGradient id="plankB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#201c1a"/>
      <stop offset="100%" stop-color="#1a1618"/>
    </linearGradient>
    <!-- Moonlight glow from window/curtains -->
    <radialGradient id="moonGlow" cx="80%" cy="40%" r="55%">
      <stop offset="0%"  stop-color="#b0b0d0" stop-opacity="0.22"/>
      <stop offset="40%" stop-color="#7878b0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#5050a0" stop-opacity="0"/>
    </radialGradient>
    <!-- Moon light floor pool (under window) -->
    <radialGradient id="moonFloor" cx="82%" cy="20%" r="70%">
      <stop offset="0%"  stop-color="#9090c0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9090c0" stop-opacity="0"/>
    </radialGradient>
    <!-- Curtain inner glow (backlit by moon) -->
    <linearGradient id="curtainGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#b0b0d0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#b0b0d0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b0b0d0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sofaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e2c3e"/>
      <stop offset="100%" stop-color="#262434"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="20%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>
  </defs>

  <!-- WALLS (pale lavender-grey) -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#wallGrad)"/>

  <!-- CEILING -->
  <rect x="0" y="0" width="1920" height="130" fill="url(#ceilGrad)"/>
  <rect x="0" y="127" width="1920" height="4" fill="#141228"/>

  <!-- FLOOR -->
  <rect x="0" y="820" width="1920" height="260" fill="url(#floorGrad)"/>
  <!-- Wood planks -->
  <rect x="0" y="820" width="1920" height="15" fill="url(#plankA)"/>
  <rect x="0" y="835" width="1920" height="15" fill="url(#plankB)"/>
  <rect x="0" y="850" width="1920" height="15" fill="url(#plankA)"/>
  <rect x="0" y="865" width="1920" height="15" fill="url(#plankB)"/>
  <rect x="0" y="880" width="1920" height="15" fill="url(#plankA)"/>
  <rect x="0" y="895" width="1920" height="15" fill="url(#plankB)"/>
  <rect x="0" y="910" width="1920" height="15" fill="url(#plankA)"/>
  <rect x="0" y="925" width="1920" height="15" fill="url(#plankB)"/>
  <rect x="0" y="940" width="1920" height="15" fill="url(#plankA)"/>
  <rect x="0" y="955" width="1920" height="15" fill="url(#plankB)"/>
  <rect x="0" y="970" width="1920" height="15" fill="url(#plankA)"/>
  <rect x="0" y="985" width="1920" height="15" fill="url(#plankB)"/>
  <rect x="0" y="1000" width="1920" height="15" fill="url(#plankA)"/>
  <rect x="0" y="1015" width="1920" height="65" fill="url(#plankB)"/>
  <!-- Plank seams -->
  <line x1="380"  y1="820" x2="380"  y2="1080" stroke="#100e0e" stroke-width="1.5" opacity="0.5"/>
  <line x1="760"  y1="820" x2="760"  y2="1080" stroke="#100e0e" stroke-width="1.5" opacity="0.5"/>
  <line x1="1140" y1="820" x2="1140" y2="1080" stroke="#100e0e" stroke-width="1.5" opacity="0.5"/>
  <line x1="1520" y1="820" x2="1520" y2="1080" stroke="#100e0e" stroke-width="1.5" opacity="0.5"/>
  <!-- Floor/wall join -->
  <rect x="0" y="818" width="1920" height="4" fill="#0e0e1e"/>
  <!-- Baseboard -->
  <rect x="0" y="804" width="1920" height="16" fill="#242238"/>
  <rect x="0" y="802" width="1920" height="4" fill="#2e2c42"/>

  <!-- MOONLIGHT GLOW (overlays) -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#moonGlow)"/>
  <rect x="0" y="820" width="1920" height="260" fill="url(#moonFloor)"/>
  <!-- Moon floor pool (angled trapezoid suggesting light through curtain gap) -->
  <polygon points="1400,820 1720,820 1920,1080 1180,1080" fill="#b0b0d0" opacity="0.06"/>

  <!-- RIGHT WALL: WINDOW WITH CURTAINS -->
  <!-- Window opening in wall -->
  <rect x="1380" y="150" width="440" height="550" fill="#080818"/>
  <!-- Night sky outside -->
  <rect x="1386" y="156" width="428" height="538" fill="#07071a"/>
  <!-- Moon visible outside (pale blue-white circle) -->
  <circle cx="1760" cy="220" r="36" fill="#909abf"/>
  <circle cx="1760" cy="220" r="28" fill="#a0aad0"/>
  <!-- Stars -->
  <circle cx="1410" cy="190" r="1.5" fill="#c8c4e8" opacity="0.75"/>
  <circle cx="1540" cy="175" r="1.5" fill="#c8c4e8" opacity="0.7"/>
  <circle cx="1640" cy="200" r="1.5" fill="#c8c4e8" opacity="0.65"/>
  <circle cx="1460" cy="240" r="1"   fill="#c8c4e8" opacity="0.6"/>
  <!-- Window frame -->
  <rect x="1378" y="148" width="8"   height="558" fill="#28263c"/>
  <rect x="1816" y="148" width="8"   height="558" fill="#28263c"/>
  <rect x="1378" y="144" width="448" height="8"   fill="#28263c"/>
  <rect x="1378" y="700" width="448" height="8"   fill="#28263c"/>
  <!-- Window cross bars -->
  <rect x="1378" y="422" width="448" height="6"   fill="#242238"/>
  <rect x="1594" y="144" width="6"   height="564" fill="#242238"/>
  <!-- Window sill -->
  <rect x="1370" y="706" width="464" height="18"  fill="#28263c"/>
  <rect x="1370" y="706" width="464" height="5"   fill="#32304a"/>
  <!-- CURTAINS (heavy dark fabric, moonlight behind) -->
  <rect x="1378" y="148" width="96" height="558" fill="#201830" opacity="0.95"/>
  <rect x="1726" y="148" width="96" height="558" fill="#201830" opacity="0.95"/>
  <!-- Curtain inner glow edges (moonlight seeping through) -->
  <rect x="1474" y="148" width="348" height="558" fill="url(#curtainGlow)"/>
  <!-- Curtain left bright edge (lit rim) -->
  <rect x="1472" y="150" width="8"   height="554" fill="#b0b0d0" opacity="0.28"/>
  <!-- Curtain right bright edge -->
  <rect x="1724" y="150" width="8"   height="554" fill="#b0b0d0" opacity="0.28"/>
  <!-- Curtain folds (left panel) -->
  <line x1="1402" y1="148" x2="1402" y2="706" stroke="#181428" stroke-width="3" opacity="0.5"/>
  <line x1="1426" y1="148" x2="1426" y2="706" stroke="#181428" stroke-width="2" opacity="0.4"/>
  <line x1="1450" y1="148" x2="1450" y2="706" stroke="#181428" stroke-width="3" opacity="0.5"/>
  <!-- Curtain folds (right panel) -->
  <line x1="1746" y1="148" x2="1746" y2="706" stroke="#181428" stroke-width="3" opacity="0.5"/>
  <line x1="1772" y1="148" x2="1772" y2="706" stroke="#181428" stroke-width="2" opacity="0.4"/>
  <line x1="1798" y1="148" x2="1798" y2="706" stroke="#181428" stroke-width="3" opacity="0.5"/>
  <!-- Curtain rod -->
  <rect x="1366" y="136" width="482" height="12" fill="#282440" rx="4"/>

  <!-- LEFT WALL: BED -->
  <!-- Bed headboard -->
  <rect x="20"  y="250" width="540" height="120" fill="#282036" rx="4"/>
  <rect x="28"  y="258" width="524" height="106" fill="#221a2e" rx="3"/>
  <!-- Bed frame sides -->
  <rect x="20"  y="358" width="26"  height="420" fill="#262032" rx="2"/>
  <rect x="534" y="358" width="26"  height="420" fill="#262032" rx="2"/>
  <!-- Bed base -->
  <rect x="20"  y="358" width="540" height="420" fill="#201c2e" rx="2"/>
  <!-- Mattress / bedding -->
  <rect x="26"  y="364" width="528" height="408" fill="#282432" rx="2"/>
  <!-- Pillow -->
  <rect x="50"  y="372" width="250" height="78"  fill="#2e2c3e" rx="6"/>
  <rect x="56"  y="378" width="238" height="66"  fill="#323048" rx="4"/>
  <!-- Pillow wrinkle line -->
  <line x1="58" y1="410" x2="288" y2="410" stroke="#28263c" stroke-width="2" opacity="0.5"/>
  <!-- Duvet / blanket (rumpled) -->
  <rect x="26"  y="458" width="528" height="314" fill="#24203a" rx="2"/>
  <!-- Blanket folds -->
  <line x1="26"  y1="530" x2="554" y2="530" stroke="#2c2840" stroke-width="4" opacity="0.5"/>
  <line x1="26"  y1="600" x2="420" y2="600" stroke="#28243c" stroke-width="3" opacity="0.45"/>
  <line x1="80"  y1="660" x2="554" y2="660" stroke="#2a263e" stroke-width="3" opacity="0.4"/>
  <!-- Stuffed animal (lump on bed, near pillow) -->
  <ellipse cx="380" cy="410" rx="32" ry="28" fill="#2c2640"/>
  <ellipse cx="356" cy="392" rx="16" ry="14" fill="#2c2640"/>
  <ellipse cx="404" cy="392" rx="16" ry="14" fill="#2c2640"/>
  <!-- Bed legs -->
  <rect x="34"  y="776" width="18" height="48" fill="#1c1826"/>
  <rect x="538" y="776" width="18" height="48" fill="#1c1826"/>
  <!-- Shadow under bed -->
  <rect x="20" y="822" width="540" height="14" fill="#0e0e1c" opacity="0.5"/>

  <!-- FAR WALL: DESK AREA (center) -->
  <!-- Desk back panel (wall behind desk) -->
  <rect x="720" y="130" width="640" height="700" fill="#18162c"/>
  <!-- Desk surface -->
  <rect x="720" y="560" width="640" height="30" fill="#242030" rx="2"/>
  <rect x="720" y="560" width="640" height="5"  fill="#302c3e"/>
  <!-- Desk legs -->
  <rect x="732" y="590" width="16" height="230" fill="#1e1c2c"/>
  <rect x="1332" y="590" width="16" height="230" fill="#1e1c2c"/>
  <!-- Back panel detail (wall color behind desk) -->
  <rect x="736" y="134" width="608" height="428" fill="#161428"/>
  <!-- Books standing on desk surface (left) -->
  <rect x="730" y="440" width="26" height="120" fill="#302040"/><!-- book 1 -->
  <rect x="758" y="454" width="20" height="106" fill="#203832"/><!-- book 2 -->
  <rect x="780" y="446" width="24" height="114" fill="#3a2232"/><!-- book 3 -->
  <rect x="806" y="450" width="20" height="110" fill="#263038"/><!-- book 4 -->
  <rect x="828" y="444" width="22" height="116" fill="#2e2842"/><!-- book 5 -->
  <!-- Book end support -->
  <rect x="851" y="438" width="14" height="122" fill="#201e2e"/>
  <!-- Notebooks stacked flat on desk -->
  <rect x="920" y="544" width="200" height="8"  fill="#28263a" rx="1"/>
  <rect x="920" y="536" width="195" height="8"  fill="#2a2840" rx="1"/>
  <rect x="920" y="528" width="192" height="8"  fill="#262438" rx="1"/>
  <!-- Loose papers on desk -->
  <rect x="1100" y="548" width="160" height="4" fill="#202038" rx="1" opacity="0.8"/>
  <rect x="1108" y="544" width="145" height="4" fill="#1e1e38" rx="1" opacity="0.7"/>
  <!-- Desk lamp (off, folded on desk) -->
  <rect x="1280" y="470" width="8"   height="90"  fill="#1e1c2c"/>
  <rect x="1246" y="460" width="48"  height="8"   fill="#1e1c2c" rx="2"/>
  <ellipse cx="1258" cy="466" rx="30" ry="12" fill="#222030"/>
  <rect x="1280" y="556" width="16"  height="10"  fill="#1a1828"/>
  <!-- Chair at desk -->
  <rect x="820" y="720" width="280" height="12"  fill="#201e2c" rx="2"/><!-- seat -->
  <rect x="832" y="732" width="16"  height="90"  fill="#1c1a28"/>
  <rect x="1072" y="732" width="16" height="90"  fill="#1c1a28"/>
  <!-- Chair back -->
  <rect x="844" y="640" width="232" height="80"  fill="#201e2c" rx="2"/>

  <!-- BOOKSHELF (left of desk) -->
  <rect x="560" y="280" width="160" height="540" fill="#1e1c28" rx="3"/>
  <rect x="568" y="288" width="144" height="524" fill="#1a1824" rx="2"/>
  <!-- Shelf dividers -->
  <rect x="568" y="408" width="144" height="5"   fill="#242234"/>
  <rect x="568" y="528" width="144" height="5"   fill="#242234"/>
  <rect x="568" y="648" width="144" height="5"   fill="#242234"/>
  <!-- Book spines on shelves -->
  <rect x="572" y="296" width="20" height="110" fill="#3a2238"/>
  <rect x="594" y="302" width="16" height="104" fill="#22382e"/>
  <rect x="612" y="298" width="18" height="108" fill="#382230"/>
  <rect x="632" y="294" width="16" height="112" fill="#223438"/>
  <rect x="650" y="300" width="18" height="106" fill="#342240"/>
  <rect x="670" y="296" width="22" height="110" fill="#1e2038"/>
  <rect x="572" y="416" width="14" height="110" fill="#302244"/>
  <rect x="588" y="420" width="18" height="106" fill="#243038"/>
  <rect x="608" y="414" width="20" height="112" fill="#342832"/>
  <rect x="630" y="418" width="16" height="108" fill="#2a3040"/>
  <rect x="648" y="412" width="22" height="114" fill="#382238"/>
  <rect x="572" y="536" width="18" height="108" fill="#223840"/>
  <rect x="592" y="540" width="14" height="104" fill="#382038"/>
  <rect x="608" y="534" width="20" height="112" fill="#2c2242"/>
  <rect x="630" y="538" width="18" height="108" fill="#1e3036"/>
  <rect x="650" y="532" width="22" height="114" fill="#342438"/>

  <!-- DRAWER UNIT beside desk (horror element) -->
  <rect x="1380" y="560" width="220" height="260" fill="#201e2e" rx="3"/>
  <rect x="1388" y="568" width="204" height="244" fill="#1c1a2a" rx="2"/>
  <!-- Drawer dividers -->
  <rect x="1390" y="622" width="196" height="4"  fill="#2a2838"/>
  <rect x="1390" y="676" width="196" height="4"  fill="#2a2838"/>
  <rect x="1390" y="730" width="196" height="4"  fill="#2a2838"/>
  <rect x="1390" y="784" width="196" height="4"  fill="#2a2838"/>
  <!-- Drawer handles -->
  <rect x="1472" y="598" width="36" height="7"   fill="#302e40" rx="2"/>
  <rect x="1472" y="652" width="36" height="7"   fill="#302e40" rx="2"/>
  <!-- OPEN DRAWER (3rd from top, horror element) -->
  <!-- The drawer face is pulled out ~4cm, revealing a dark interior gap -->
  <rect x="1386" y="676" width="208" height="54" fill="#1e1c2e"/><!-- drawer body protruding -->
  <rect x="1386" y="676" width="208" height="8"  fill="#12101e"/><!-- dark gap at top of open drawer -->
  <!-- Dark gap (inside of drawer, looking down) -->
  <rect x="1390" y="684" width="200" height="42" fill="#0e0c1a"/>
  <!-- Something inside the open drawer — papers / a photo -->
  <rect x="1396" y="688" width="180" height="34" fill="#14121e"/>
  <!-- A slightly warm-colored paper — doesn't quite look right -->
  <rect x="1420" y="690" width="80"  height="28" fill="#1e1c20"/>
  <!-- Drawer handle -->
  <rect x="1472" y="702" width="36" height="7"   fill="#302e40" rx="2"/>
  <!-- Lower drawers -->
  <rect x="1472" y="756" width="36" height="7"   fill="#302e40" rx="2"/>

  <!-- Vignette -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>
</svg>

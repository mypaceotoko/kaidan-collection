<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <!--
    The window reflection scene.
    A large dark window dominates the right side.
    The protagonist's reflection is visible —
    but the reflection's head is tilted at an unnatural angle.
  -->
  <defs>
    <radialGradient id="voidCenter" cx="50%" cy="42%" r="28%">
      <stop offset="0%"   stop-color="#1a1432" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="floorG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#181826"/>
      <stop offset="100%" stop-color="#0e0e1c"/>
    </linearGradient>
    <linearGradient id="nightOut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#06082a"/>
      <stop offset="50%"  stop-color="#050726"/>
      <stop offset="100%" stop-color="#040620"/>
    </linearGradient>
    <radialGradient id="reflGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%"   stop-color="#1a1a60" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="fixtureGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6060a0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="#131320"/>

  <!-- CORRIDOR PLANES — VP = (960, 453) -->
  <polygon points="0,0     1920,0    1920,270 960,453 0,270" fill="#0e0e1c"/>
  <polygon points="0,0     0,1080    960,453" fill="#1c1c2c"/>
  <polygon points="1920,0  1920,1080 960,453" fill="#161628"/>
  <polygon points="0,1080  1920,1080 1920,680 960,453 0,680" fill="url(#floorG)"/>
  <ellipse cx="960" cy="453" rx="360" ry="190" fill="url(#voidCenter)"/>

  <!-- Floor lines -->
  <line x1="960" y1="453" x2="0"    y2="1080" stroke="#1e1e2e" stroke-width="2"/>
  <line x1="960" y1="453" x2="480"  y2="1080" stroke="#1c1c2a" stroke-width="1.5"/>
  <line x1="960" y1="453" x2="960"  y2="1080" stroke="#202030" stroke-width="2.5"/>
  <line x1="960" y1="453" x2="1440" y2="1080" stroke="#1c1c2a" stroke-width="1.5"/>
  <line x1="960" y1="453" x2="1920" y2="1080" stroke="#1e1e2e" stroke-width="2"/>
  <line x1="0"   y1="870" x2="1920" y2="870"  stroke="#181828" stroke-width="1.5"/>
  <line x1="0"   y1="720" x2="1920" y2="720"  stroke="#161626" stroke-width="1.2"/>
  <line x1="50"  y1="610" x2="1870" y2="610"  stroke="#141424" stroke-width="1"/>

  <!-- LEFT: LOCKERS -->
  <rect x="0"   y="108" width="112" height="862" fill="#242438"/>
  <rect x="4"   y="112" width="102" height="854" fill="#1e1e30"/>
  <rect x="4"   y="112" width="102" height="281" fill="#1c1c2e"/>
  <rect x="4"   y="397" width="102" height="281" fill="#1e1e30"/>
  <rect x="4"   y="682" width="102" height="284" fill="#1c1c2e"/>
  <rect x="4"   y="393" width="102" height="6"   fill="#30304c"/>
  <rect x="4"   y="678" width="102" height="6"   fill="#30304c"/>
  <rect x="97"  y="250" width="9"   height="22"  fill="#3e3e5c" rx="2"/>
  <rect x="97"  y="536" width="9"   height="22"  fill="#3e3e5c" rx="2"/>
  <rect x="116" y="190" width="78"  height="752" fill="#1e1e30"/>
  <rect x="119" y="193" width="72"  height="746" fill="#1a1a2c"/>
  <rect x="184" y="314" width="6"   height="16"  fill="#2e2e4e" rx="1"/>
  <rect x="194" y="250" width="58"  height="652" fill="#1c1c2c"/>
  <rect x="249" y="296" width="44"  height="600" fill="#1a1a2a"/>
  <rect x="293" y="320" width="34"  height="556" fill="#161626"/>
  <rect x="327" y="338" width="633" height="528" fill="#121220"/>

  <!-- RIGHT: THE DOMINANT WINDOW -->
  <rect x="1190" y="58"  width="730" height="692" fill="#101028"/>
  <rect x="1198" y="66"  width="714" height="676" fill="url(#nightOut)"/>

  <!-- Night outside: ground, fence, tree, moon -->
  <rect x="1198" y="565" width="714" height="177" fill="#06081e" opacity="0.8"/>
  <rect x="1240" y="488" width="10"  height="80"  fill="#04061a" opacity="0.7"/>
  <rect x="1310" y="476" width="10"  height="92"  fill="#04061a" opacity="0.7"/>
  <rect x="1380" y="482" width="10"  height="86"  fill="#04061a" opacity="0.6"/>
  <rect x="1240" y="486" width="160" height="5"   fill="#05071c" opacity="0.7"/>
  <line x1="1660" y1="566" x2="1660" y2="320"    stroke="#04061c" stroke-width="6" opacity="0.7"/>
  <line x1="1660" y1="386" x2="1618" y2="334"    stroke="#04061c" stroke-width="3" opacity="0.6"/>
  <line x1="1660" y1="346" x2="1700" y2="300"    stroke="#04061c" stroke-width="3" opacity="0.6"/>
  <circle cx="1840" cy="112" r="30"  fill="#b0a040"/>
  <circle cx="1840" cy="112" r="24"  fill="#c8b450"/>
  <ellipse cx="1570" cy="608" rx="130" ry="35" fill="#0a0e38" opacity="0.5"/>

  <!-- Window frame -->
  <rect x="1190" y="58"  width="10"  height="692" fill="#222236"/>
  <rect x="1910" y="58"  width="10"  height="692" fill="#222236"/>
  <rect x="1190" y="58"  width="730" height="10"  fill="#222236"/>
  <rect x="1190" y="740" width="730" height="10"  fill="#222236"/>
  <rect x="1190" y="398" width="730" height="6"   fill="#1e1e30"/>
  <rect x="1552" y="58"  width="6"   height="692" fill="#1e1e30"/>
  <rect x="1180" y="748" width="740" height="24"  fill="#202038"/>
  <rect x="1180" y="756" width="740" height="12"  fill="#282848"/>

  <!-- THE REFLECTION — head tilted LEFT 28°, wrong angle -->
  <ellipse cx="1552" cy="395" rx="60" ry="130" fill="url(#reflGlow)"/>
  <g transform="translate(1552,302) rotate(-28)">
    <ellipse cx="0" cy="0" rx="20" ry="23" fill="#080828" opacity="0.82"/>
  </g>
  <rect x="1545" y="318" width="15" height="18"  fill="#080828" opacity="0.78"/>
  <rect x="1522" y="334" width="62" height="15"  fill="#080828" opacity="0.75"/>
  <rect x="1532" y="347" width="42" height="85"  fill="#080828" opacity="0.72" rx="2"/>
  <rect x="1518" y="352" width="14" height="68"  fill="#06061e" opacity="0.68"/>
  <rect x="1576" y="352" width="14" height="68"  fill="#06061e" opacity="0.68"/>
  <rect x="1532" y="432" width="16" height="75"  fill="#080828" opacity="0.62"/>
  <rect x="1552" y="432" width="16" height="75"  fill="#080828" opacity="0.62"/>
  <!-- Glass shimmer lines -->
  <rect x="1198" y="162" width="714" height="1.5" fill="#10103a" opacity="0.35"/>
  <rect x="1198" y="285" width="714" height="1.5" fill="#0e0e36" opacity="0.3"/>
  <rect x="1198" y="425" width="714" height="1.5" fill="#10103a" opacity="0.35"/>
  <rect x="1198" y="565" width="714" height="1.5" fill="#0e0e36" opacity="0.25"/>

  <!-- Small secondary window -->
  <rect x="1055" y="334" width="144" height="174" fill="#080820"/>
  <rect x="1058" y="337" width="138" height="168" fill="#060618"/>
  <rect x="1055" y="334" width="4"   height="174" fill="#1e1e30"/>
  <rect x="1195" y="334" width="4"   height="174" fill="#1e1e30"/>
  <rect x="1055" y="334" width="144" height="4"   fill="#1e1e30"/>
  <rect x="1055" y="504" width="144" height="4"   fill="#1e1e30"/>
  <circle cx="1090" cy="370" r="1.5" fill="#c0b8e0" opacity="0.65"/>
  <circle cx="1160" cy="350" r="1.5" fill="#c0b8e0" opacity="0.6"/>

  <!-- CEILING FIXTURE -->
  <rect x="805" y="52"  width="310" height="22"  fill="#242440" rx="3"/>
  <rect x="810" y="55"  width="300" height="14"  fill="#b0b0d0" opacity="0.82"/>
  <ellipse cx="960" cy="63"  rx="320" ry="80"  fill="url(#fixtureGlow)"/>
  <line x1="805"  y1="0"   x2="805"  y2="52"  stroke="#1e1e30" stroke-width="2"/>
  <line x1="1115" y1="0"   x2="1115" y2="52"  stroke="#1e1e30" stroke-width="2"/>
  <rect x="874" y="195" width="172" height="14"  fill="#1e1e38" rx="2"/>
  <rect x="877" y="198" width="166" height="8"   fill="#8080b0" opacity="0.65"/>

  <!-- Floor window reflection -->
  <polygon points="1190,748 1920,748 1920,1080 780,1080"
           fill="#060620" opacity="0.2"/>

  <!-- Vignette -->
  <rect width="1920" height="1080" fill="#000008" opacity="0.18"/>
</svg>

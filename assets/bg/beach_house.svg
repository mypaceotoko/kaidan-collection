<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5a3a20"/>
      <stop offset="100%" stop-color="#4a2e18"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4a3220"/>
      <stop offset="100%" stop-color="#3a2818"/>
    </linearGradient>
    <linearGradient id="counterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6a4028"/>
      <stop offset="100%" stop-color="#5a3420"/>
    </linearGradient>
    <linearGradient id="outsideGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5090d0"/>
      <stop offset="50%"  stop-color="#3a70b8"/>
      <stop offset="80%"  stop-color="#60a8d0"/>
      <stop offset="100%" stop-color="#c8a850"/>
    </linearGradient>
    <linearGradient id="shadeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a1c10" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a100a" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="25%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- Outside background visible through opening -->
  <rect x="0"    y="0"   width="1920" height="1080" fill="url(#outsideGrad)"/>

  <!-- LEFT WALL of beach house -->
  <rect x="0"    y="0"   width="540"  height="1080" fill="url(#wallGrad)"/>
  <!-- Left wall wood plank lines (horizontal) -->
  <rect x="0"    y="120" width="540"  height="6"  fill="#3a2214" opacity="0.6"/>
  <rect x="0"    y="200" width="540"  height="5"  fill="#3a2214" opacity="0.5"/>
  <rect x="0"    y="280" width="540"  height="5"  fill="#3a2214" opacity="0.5"/>
  <rect x="0"    y="360" width="540"  height="5"  fill="#3a2214" opacity="0.45"/>
  <rect x="0"    y="440" width="540"  height="5"  fill="#3a2214" opacity="0.45"/>
  <rect x="0"    y="520" width="540"  height="5"  fill="#3a2214" opacity="0.4"/>
  <rect x="0"    y="600" width="540"  height="5"  fill="#3a2214" opacity="0.4"/>

  <!-- RIGHT WALL -->
  <rect x="1380" y="0"   width="540"  height="1080" fill="url(#wallGrad)"/>
  <rect x="1380" y="120" width="540"  height="6"  fill="#3a2214" opacity="0.6"/>
  <rect x="1380" y="200" width="540"  height="5"  fill="#3a2214" opacity="0.5"/>
  <rect x="1380" y="280" width="540"  height="5"  fill="#3a2214" opacity="0.5"/>
  <rect x="1380" y="360" width="540"  height="5"  fill="#3a2214" opacity="0.45"/>
  <rect x="1380" y="440" width="540"  height="5"  fill="#3a2214" opacity="0.45"/>
  <rect x="1380" y="520" width="540"  height="5"  fill="#3a2214" opacity="0.4"/>

  <!-- ROOF OVERHANG (shade strip at top) -->
  <rect x="0"    y="0"   width="1920" height="230" fill="url(#roofGrad)"/>
  <!-- Roof underside shadow -->
  <rect x="0"    y="200" width="1920" height="50"  fill="url(#shadeGrad)"/>
  <!-- Roof beam lines -->
  <rect x="540"  y="0"   width="18"  height="230" fill="#3a2810"/>
  <rect x="960"  y="0"   width="18"  height="230" fill="#3a2810"/>
  <rect x="1362" y="0"   width="18"  height="230" fill="#3a2810"/>

  <!-- MENU BOARD (back wall, center) -->
  <rect x="700"  y="240" width="520" height="320" fill="#2a1e10" rx="4"/>
  <rect x="712"  y="252" width="496" height="296" fill="#241a0e" rx="3"/>
  <!-- Menu text lines (chalk-style) -->
  <rect x="740"  y="280" width="200" height="10" fill="#c8c0a0" opacity="0.7" rx="2"/>
  <rect x="740"  y="306" width="160" height="8"  fill="#b0a888" opacity="0.6" rx="2"/>
  <rect x="740"  y="328" width="180" height="8"  fill="#b0a888" opacity="0.6" rx="2"/>
  <rect x="740"  y="350" width="140" height="8"  fill="#b0a888" opacity="0.55" rx="2"/>
  <rect x="740"  y="376" width="200" height="10" fill="#c8c0a0" opacity="0.65" rx="2"/>
  <rect x="740"  y="402" width="155" height="8"  fill="#b0a888" opacity="0.6" rx="2"/>
  <rect x="740"  y="424" width="170" height="8"  fill="#b0a888" opacity="0.55" rx="2"/>
  <rect x="740"  y="450" width="130" height="8"  fill="#b0a888" opacity="0.55" rx="2"/>
  <!-- Prices column -->
  <rect x="980"  y="306" width="80" height="8" fill="#a0c890" opacity="0.6" rx="2"/>
  <rect x="980"  y="328" width="80" height="8" fill="#a0c890" opacity="0.6" rx="2"/>
  <rect x="980"  y="350" width="80" height="8" fill="#a0c890" opacity="0.6" rx="2"/>
  <rect x="980"  y="402" width="80" height="8" fill="#a0c890" opacity="0.6" rx="2"/>
  <rect x="980"  y="424" width="80" height="8" fill="#a0c890" opacity="0.6" rx="2"/>

  <!-- COUNTER (wide surface) -->
  <rect x="0"    y="740" width="1920" height="50"  fill="url(#counterGrad)"/>
  <rect x="0"    y="786" width="1920" height="294" fill="#3a2818"/>
  <!-- Counter front edge highlight -->
  <rect x="0"    y="738" width="1920" height="5"  fill="#7a5030" opacity="0.5"/>

  <!-- Items on counter -->
  <!-- Bottle lineup -->
  <rect x="160"  y="668" width="30" height="72" fill="#4888a8" rx="4" opacity="0.85"/>
  <ellipse cx="175" cy="668" rx="15" ry="7" fill="#58a0c0" opacity="0.8"/>
  <rect x="210"  y="675" width="28" height="65" fill="#c87040" rx="4" opacity="0.85"/>
  <ellipse cx="224" cy="675" rx="14" ry="6" fill="#e08050" opacity="0.8"/>
  <rect x="256"  y="660" width="32" height="80" fill="#40a060" rx="4" opacity="0.85"/>
  <ellipse cx="272" cy="660" rx="16" ry="7" fill="#50c070" opacity="0.8"/>
  <rect x="302"  y="672" width="28" height="68" fill="#c8a030" rx="4" opacity="0.85"/>
  <!-- Shaved ice machine (center-left) -->
  <rect x="440"  y="580" width="140" height="160" fill="#5a3c28" rx="6"/>
  <rect x="452"  y="592" width="116" height="136" fill="#4a3020" rx="4"/>
  <ellipse cx="510" cy="625" rx="42" ry="40" fill="#3a2418" opacity="0.8"/>
  <!-- Cups on counter -->
  <rect x="800"  y="694" width="44" height="46" fill="#e8e0d0" rx="3" opacity="0.85"/>
  <rect x="808"  y="680" width="28" height="16" fill="#d0c8b8" opacity="0.7"/>
  <rect x="860"  y="698" width="44" height="42" fill="#e8e0d0" rx="3" opacity="0.8"/>
  <!-- Snack display box -->
  <rect x="1100" y="650" width="180" height="90" fill="#c89040" rx="4" opacity="0.85"/>
  <rect x="1110" y="660" width="160" height="70" fill="#b88030" rx="3" opacity="0.8"/>
  <!-- Drinks cooler (right) -->
  <rect x="1420" y="560" width="260" height="180" fill="#3a3040" rx="5" opacity="0.9"/>
  <rect x="1430" y="570" width="240" height="160" fill="#2a2838" rx="4" opacity="0.9"/>
  <rect x="1440" y="580" width="80"  height="140" fill="#5898c8" opacity="0.55"/>
  <rect x="1530" y="580" width="80"  height="140" fill="#58a870" opacity="0.45"/>
  <rect x="1620" y="580" width="40"  height="140" fill="#c87040" opacity="0.45"/>

  <!-- Hanging lanterns -->
  <ellipse cx="540"  cy="255" rx="26" ry="34" fill="#e05040" opacity="0.8"/>
  <rect x="527"  y="220" width="26" height="6"  fill="#5a3020"/>
  <ellipse cx="960"  cy="248" rx="24" ry="30" fill="#e84838" opacity="0.85"/>
  <rect x="948"  y="218" width="24" height="5"  fill="#5a3020"/>
  <ellipse cx="1380" cy="255" rx="26" ry="34" fill="#e05040" opacity="0.8"/>
  <rect x="1367" y="220" width="26" height="6"  fill="#5a3020"/>

  <!-- Vignette -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>
</svg>

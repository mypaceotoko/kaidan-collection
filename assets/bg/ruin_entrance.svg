<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1610"/>
      <stop offset="100%" stop-color="#120e0a"/>
    </linearGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#181410"/>
      <stop offset="100%" stop-color="#100c08"/>
    </linearGradient>
    <linearGradient id="ceilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0e0c08"/>
      <stop offset="100%" stop-color="#141008"/>
    </linearGradient>
    <!-- Bare bulb: very faint warm glow -->
    <radialGradient id="bulbGlow" cx="50%" cy="15%" r="35%">
      <stop offset="0%"   stop-color="#c09040" stop-opacity="0.65"/>
      <stop offset="40%"  stop-color="#a07020" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a07020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="20%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.75"/>
    </radialGradient>
  </defs>

  <!-- Base walls (rotting wood / plaster) -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#wallGrad)"/>

  <!-- Ceiling -->
  <rect x="0" y="0" width="1920" height="180" fill="url(#ceilGrad)"/>
  <!-- Ceiling-wall junction (dark crack line) -->
  <rect x="0" y="178" width="1920" height="5" fill="#0a0806" opacity="0.8"/>

  <!-- Wallpaper: peeling, stained (left wall) -->
  <!-- Base wallpaper color — faded floral pattern suggestion -->
  <rect x="0"    y="180" width="540" height="740" fill="#1c1812"/>
  <!-- Horizontal stripe pattern (faded) -->
  <rect x="0"    y="220" width="540" height="8"  fill="#201c14" opacity="0.5"/>
  <rect x="0"    y="280" width="540" height="6"  fill="#201c14" opacity="0.45"/>
  <rect x="0"    y="340" width="540" height="7"  fill="#1e1a12" opacity="0.4"/>
  <rect x="0"    y="400" width="540" height="6"  fill="#201c14" opacity="0.4"/>
  <rect x="0"    y="460" width="540" height="7"  fill="#1e1a12" opacity="0.35"/>
  <rect x="0"    y="520" width="540" height="6"  fill="#201c14" opacity="0.35"/>
  <!-- Peeling patches -->
  <polygon points="80,300 160,280 200,360 120,380" fill="#141008" opacity="0.6"/>
  <polygon points="320,450 400,430 420,520 340,530" fill="#120e08" opacity="0.55"/>
  <polygon points="50,600 130,580 140,650 60,660" fill="#141008" opacity="0.5"/>
  <!-- Water stain marks -->
  <ellipse cx="220" cy="500" rx="60" ry="80" fill="#0e0c08" opacity="0.35"/>
  <ellipse cx="420" cy="700" rx="40" ry="60" fill="#0c0a06" opacity="0.3"/>

  <!-- Right wall -->
  <rect x="1380" y="180" width="540" height="740" fill="#1c1812"/>
  <rect x="1380" y="220" width="540" height="8"  fill="#201c14" opacity="0.5"/>
  <rect x="1380" y="280" width="540" height="6"  fill="#201c14" opacity="0.45"/>
  <rect x="1380" y="360" width="540" height="7"  fill="#1e1a12" opacity="0.4"/>
  <rect x="1380" y="440" width="540" height="6"  fill="#201c14" opacity="0.4"/>
  <rect x="1380" y="520" width="540" height="7"  fill="#1e1a12" opacity="0.35"/>
  <polygon points="1520,350 1620,330 1650,420 1540,440" fill="#141008" opacity="0.6"/>
  <polygon points="1700,580 1780,560 1800,650 1720,660" fill="#120e08" opacity="0.5"/>

  <!-- Far wall (deep hallway seen beyond) -->
  <rect x="540" y="180" width="840" height="740" fill="#100e0c"/>
  <!-- Far wall horizontal lines (planks) -->
  <rect x="540" y="260" width="840" height="5"  fill="#0e0c0a" opacity="0.6"/>
  <rect x="540" y="360" width="840" height="4"  fill="#0e0c0a" opacity="0.5"/>
  <rect x="540" y="460" width="840" height="4"  fill="#0e0c0a" opacity="0.5"/>
  <rect x="540" y="560" width="840" height="4"  fill="#0c0a08" opacity="0.45"/>
  <rect x="540" y="660" width="840" height="4"  fill="#0c0a08" opacity="0.45"/>
  <rect x="540" y="760" width="840" height="4"  fill="#0c0a08" opacity="0.4"/>

  <!-- Hallway opening (perspective into darkness) -->
  <rect x="720" y="200" width="480" height="680" fill="#0c0a08"/>
  <rect x="740" y="220" width="440" height="640" fill="#080806"/>
  <rect x="760" y="240" width="400" height="600" fill="#060604"/>

  <!-- Bulb glow overlay -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#bulbGlow)"/>
  <!-- Bare light bulb hanging from ceiling (center) -->
  <line x1="960" y1="0" x2="960" y2="148" stroke="#2a2018" stroke-width="3"/>
  <ellipse cx="960" cy="155" rx="16" ry="20" fill="#2a2018"/>
  <ellipse cx="960" cy="162" rx="12" ry="14" fill="#c8a840" opacity="0.7"/>
  <ellipse cx="960" cy="168" rx="7"  ry="8"  fill="#e0c060" opacity="0.85"/>

  <!-- Floor (rotting wood planks) -->
  <rect x="0" y="920" width="1920" height="160" fill="url(#floorGrad)"/>
  <!-- Plank lines -->
  <rect x="0"   y="920" width="1920" height="4"  fill="#0c0a06" opacity="0.7"/>
  <rect x="0"   y="945" width="1920" height="3"  fill="#0c0a06" opacity="0.6"/>
  <rect x="0"   y="970" width="1920" height="3"  fill="#0a0804" opacity="0.55"/>
  <rect x="0"   y="995" width="1920" height="3"  fill="#0a0804" opacity="0.5"/>
  <rect x="0"   y="1020" width="1920" height="3" fill="#0a0804" opacity="0.45"/>
  <rect x="0"   y="1045" width="1920" height="3" fill="#080602" opacity="0.4"/>
  <!-- Missing/broken board -->
  <rect x="800" y="950" width="80"  height="60" fill="#060402" opacity="0.9"/>
  <rect x="1100" y="965" width="60" height="40" fill="#060402" opacity="0.85"/>

  <!-- Up-gama / step edge -->
  <rect x="0"   y="916" width="1920" height="8"  fill="#241c10"/>
  <rect x="0"   y="914" width="1920" height="4"  fill="#302818" opacity="0.7"/>

  <!-- THE SHOES — arranged neatly on the step (horror element) -->
  <!-- Left shoe -->
  <ellipse cx="820" cy="915" rx="52" ry="16" fill="#2a2018"/>
  <rect x="776"  y="898" width="88" height="18" fill="#241c14" rx="4"/>
  <ellipse cx="820" cy="898" rx="44" ry="10" fill="#302818"/>
  <!-- Right shoe -->
  <ellipse cx="930" cy="915" rx="52" ry="16" fill="#2a2018"/>
  <rect x="886"  y="898" width="88" height="18" fill="#241c14" rx="4"/>
  <ellipse cx="930" cy="898" rx="44" ry="10" fill="#302818"/>
  <!-- They are child-sized — annotation via size (already smallish) -->

  <!-- Coat on wall hook (left) -->
  <rect x="160"  y="300" width="10" height="16" fill="#282018" rx="2"/>
  <path d="M 130,316 Q 165,310 200,316 L 210,520 Q 165,530 120,520 Z" fill="#1e1812" opacity="0.85"/>
  <!-- Collar detail -->
  <path d="M 130,316 Q 165,324 200,316" stroke="#282018" stroke-width="3" fill="none"/>

  <!-- Umbrella stand (right side, near entrance) -->
  <rect x="1360" y="740" width="48" height="180" fill="#1c1812" rx="4"/>
  <rect x="1368" y="748" width="32" height="168" fill="#181410" rx="3"/>
  <!-- Umbrella handles -->
  <path d="M 1376,740 Q 1382,722 1388,740" stroke="#282018" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 1392,740 Q 1399,718 1406,740" stroke="#221c14" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Family photos on wall (horror element — all facing camera) -->
  <rect x="60"   y="420" width="110" height="140" fill="#201a12" rx="2"/>
  <rect x="66"   y="426" width="98"  height="128" fill="#181210" rx="1"/>
  <!-- Face in photo 1 (oval) -->
  <ellipse cx="115" cy="476" rx="22" ry="26" fill="#2c2218"/>
  <!-- Second photo -->
  <rect x="200"  y="440" width="100" height="130" fill="#201a12" rx="2"/>
  <rect x="206"  y="446" width="88"  height="118" fill="#181210" rx="1"/>
  <ellipse cx="250" cy="490" rx="20" ry="24" fill="#2c2218"/>
  <!-- Third photo (different size) -->
  <rect x="60"   y="590" width="130" height="90"  fill="#201a12" rx="2"/>
  <rect x="66"   y="596" width="118" height="78"  fill="#181210" rx="1"/>
  <!-- Family group: three oval faces -->
  <ellipse cx="108" cy="630" rx="16" ry="18" fill="#2c2218"/>
  <ellipse cx="142" cy="626" rx="16" ry="20" fill="#2c2218"/>
  <ellipse cx="175" cy="628" rx="14" ry="17" fill="#2c2218"/>

  <!-- Vignette -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#vignette)"/>
</svg>
